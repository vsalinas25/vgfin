      <button className="fab" onClick={() => setModal({ type: 'new' })} title="Nova Despesa (N)">+</button>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════
   MODULE 3 — FORNECEDORES
═══════════════════════════════════════════════════════ */
function Fornecedores({ suppliers, expenses, onRefresh, isOwner }) {
  const { supplierCategories } = useCategories();
  const [view, setView] = useState('card'); // card | table
  const [search, setSearch] = useState('');
  const [catFilter, setCatFilter] = useState('');
  const [panel, setPanel] = useState(null);
  const [modal, setModal] = useState(null);
  const [confirm, setConfirm] = useState(null);

  const filtered = suppliers.filter(s => {
    if (catFilter && s.category !== catFilter) return false;
    if (search && !s.name.toLowerCase().includes(search.toLowerCase())) return false;
    return true;
  });

  function supplierStats(sid) {
    const supplier = suppliers.find(s => s.id === sid);
    const sname = supplier?.name || '';
    const exps = expenses.filter(e =>
      e.supplier_id === sid ||
      (sname && e.supplier_name?.toLowerCase() === sname.toLowerCase())
    );
    const total = exps.reduce((a,b) => a + (parseFloat(b.amount) || 0), 0);
    const sorted = [...exps].sort((a,b) => b.due_date.localeCompare(a.due_date));
    return { total, last: sorted[0]?.due_date, count: exps.length };
  }

  async function handleSave(form) {
    if (panel && panel.id) {
      const { error } = await sb.from('suppliers').update(form).eq('id', panel.id);
      if (error) { toast('Erro: ' + error.message, 'error'); return; }
    } else {
      const { error } = await sb.from('suppliers').insert(form);
      if (error) { toast('Erro: ' + error.message, 'error'); return; }
    }
    toast('Fornecedor salvo!', 'success');
    setModal(null); setPanel(null);
    onRefresh();
  }

  async function handleDelete(id) {
    const { error } = await sb.from('suppliers').delete().eq('id', id);
    if (error) { toast('Erro: ' + error.message, 'error'); return; }
    toast('Fornecedor excluído.', 'info');
    setConfirm(null); setPanel(null);
    onRefresh();
  }

  return (
    <div className="page">
      <div className="page-header" style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
        <div className="page-title">Fornecedores</div>
        <div style={{ display: 'flex', gap: 10 }}>
          <button className={`btn ${view==='card'?'btn-primary':'btn-secondary'}`} onClick={() => setView('card')}>⊞ Cards</button>
          <button className={`btn ${view==='table'?'btn-primary':'btn-secondary'}`} onClick={() => setView('table')}>≡ Tabela</button>
          {isOwner && <button className="btn btn-primary" onClick={() => setModal({ mode: 'new' })}>+ Novo</button>}
        </div>
      </div>

      <div className="filters-bar">
        <input className="form-control" placeholder="Buscar..." value={search} onChange={e => setSearch(e.target.value)} style={{ minWidth: 200 }} />
        <select className="form-control" value={catFilter} onChange={e => setCatFilter(e.target.value)}>
          <option value="">Todas categorias</option>
          {supplierCategories.map(c => <option key={c}>{c}</option>)}
        </select>
        <button className="btn btn-ghost btn-sm" onClick={() => { setSearch(''); setCatFilter(''); }}>Limpar</button>
      </div>

      {view === 'card' ? (
        <div className="card-grid">
          {filtered.map(s => {
            const { total, last, count } = supplierStats(s.id);
            return (
              <div key={s.id} className="supplier-card" onClick={() => setPanel(s)}>
                <div className="supplier-card-name">{s.name}</div>
                <div className="supplier-card-cat">{s.category}</div>
                <div className="supplier-card-stats">
                  <div className="supplier-stat"><strong>{fmtBRL(total)}</strong>Total gasto</div>
                  <div className="supplier-stat"><strong>{last ? fmtDate(last) : '—'}</strong>Última compra</div>
                  <div className="supplier-stat"><strong>{count}</strong>Compras</div>
                </div>
              </div>
            );
          })}
        </div>
      ) : (
        <div className="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Nome</th><th>Categoria</th><th>Forma Pagto</th><th>Total Gasto</th><th>Última Compra</th><th>Ações</th>
              </tr>
            </thead>
            <tbody>
              {filtered.map(s => {
                const { total, last, count } = supplierStats(s.id);
                return (
                  <tr key={s.id}>
                    <td><strong>{s.name}</strong></td>
                    <td>{s.category}</td>
                    <td style={{ fontSize: 12, color: 'var(--muted)' }}>{s.default_payment_method || '—'}</td>
                    <td className="mono">{fmtBRL(total)}</td>
                    <td style={{ fontSize: 12 }}>{last ? fmtDate(last) : '—'}</td>
                    <td>
                      <div style={{ display: 'flex', gap: 6 }}>
                        <button className="btn btn-ghost btn-sm" onClick={() => setPanel(s)}>Ver</button>
                        {isOwner && <button className="btn btn-ghost btn-sm" style={{ color: 'var(--danger)' }} onClick={() => setConfirm(s)}>✕</button>}
                      </div>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      )}

      {/* Side panel */}
      {panel && (
        <>
          <div className="side-panel-overlay" onClick={() => setPanel(null)} />
          <div className="side-panel">
            <div className="panel-header">
              <div className="panel-title">{panel.name}</div>
              <button className="modal-close" onClick={() => setPanel(null)}>✕</button>
            </div>
            <div className="panel-body">
              <SupplierDetail
                supplier={panel}
                expenses={expenses}
                isOwner={isOwner}
                onEdit={() => setModal({ mode: 'edit', supplier: panel })}
                onDelete={() => setConfirm(panel)}
              />
            </div>
          </div>
        </>
      )}

      {/* Add/Edit modal */}
      {modal && (
        <SupplierModal
          supplier={modal.supplier}
          onSave={handleSave}
          onClose={() => setModal(null)}
        />
      )}

      {confirm && (
        <ConfirmDialog
          title="Excluir Fornecedor"
          msg={`Deseja excluir ${confirm.name}? Esta ação não pode ser desfeita.`}
          onConfirm={() => handleDelete(confirm.id)}
          onCancel={() => setConfirm(null)}
        />
      )}
    </div>
  );
}

function SupplierDetail({ supplier, expenses, isOwner, onEdit, onDelete }) {
  const supExp = expenses.filter(e => e.supplier_id === supplier.id || e.supplier_name === supplier.name);
  const total = supExp.reduce((a,b) => a+b.amount, 0);
  const months = [...new Set(supExp.map(e => e.due_date.slice(0,7)))];
  const avg = months.length > 0 ? total / months.length : 0;
  const last = supExp.sort((a,b) => b.due_date.localeCompare(a.due_date))[0];

  return (
    <div>
      <div style={{ display: 'flex', gap: 10, marginBottom: 20 }}>
        {isOwner && <button className="btn btn-secondary btn-sm" onClick={onEdit}>✎ Editar</button>}
        {isOwner && <button className="btn btn-danger btn-sm" onClick={onDelete}>✕ Excluir</button>}
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 12, marginBottom: 20 }}>
        <div className="metric-card" style={{ padding: '14px 16px' }}>
          <div className="metric-label">Total Gasto</div>
          <div className="metric-value" style={{ fontSize: 16 }}>{fmtBRL(total)}</div>
        </div>
        <div className="metric-card" style={{ padding: '14px 16px' }}>
          <div className="metric-label">Média Mensal</div>
          <div className="metric-value" style={{ fontSize: 16 }}>{fmtBRL(avg)}</div>
        </div>
        <div className="metric-card" style={{ padding: '14px 16px' }}>
          <div className="metric-label">Última Compra</div>
          <div className="metric-value" style={{ fontSize: 14 }}>{last ? fmtDate(last.due_date) : '—'}</div>
        </div>
      </div>

      <div style={{ fontSize: 10, fontWeight: 600, color: 'var(--muted)', letterSpacing: '0.1em', textTransform: 'uppercase', marginBottom: 8 }}>Histórico de Pagamentos</div>
      <div className="table-wrap">
        <table>
          <thead>
            <tr><th>Data</th><th>Tipo</th><th>Valor</th><th>Status</th></tr>
          </thead>
          <tbody>
            {supExp.length === 0 ? (
              <tr><td colSpan={4} style={{ textAlign: 'center', color: 'var(--muted)', padding: 24 }}>Sem histórico.</td></tr>
            ) : supExp.sort((a,b)=>b.due_date.localeCompare(a.due_date)).slice(0,20).map(e => (
              <tr key={e.id}>
                <td style={{ fontSize: 12 }}>{fmtDate(e.due_date)}</td>
                <td style={{ fontSize: 12 }}>{e.expense_type || e.category}</td>
                <td className="mono" style={{ fontWeight: 600 }}>{fmtBRL(e.amount)}</td>
                <td>{e.status === 'pago' ? <span className="badge badge-paid">Pago</span> : <span className="badge badge-pending">Pendente</span>}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════
   MODULE 4 — FLUXO DE CAIXA
═══════════════════════════════════════════════════════ */
function FluxoDeCaixa({ expenses, revenue, onRefresh }) {
  const [year, setYear] = useState(new Date().getFullYear());
  const [editingRev, setEditingRev] = useState({});
  const [saving, setSaving] = useState(false);
  const [revenueModal, setRevenueModal] = useState(false);

  async function handleSaveRevenue(payload) {
    const user = (await sb.auth.getUser()).data.user;
    const existing = revenue.find(r => r.month === payload.month);
    if (existing) {
      const { error } = await sb.from('revenue').update({ amount: payload.amount, notes: payload.notes, created_by: user.id }).eq('id', existing.id);
      if (error) { toast('Erro: ' + error.message, 'error'); return; }
    } else {
      const { error } = await sb.from('revenue').insert({ ...payload, created_by: user.id });
      if (error) { toast('Erro: ' + error.message, 'error'); return; }
    }
    toast('Receita salva!', 'success');
    setRevenueModal(false);
    onRefresh();
  }

  const months = Array.from({ length: 12 }, (_, i) => {
    const m = String(i+1).padStart(2,'0');
    return `${year}-${m}`;
  });

  function getRevenue(ym) {
    return revenue.filter(r => {
      const key = r.date ? r.date : (r.month + '-01');
      return key.startsWith(ym);
    }).reduce((a,b) => a + (parseFloat(b.amount) || 0), 0);
  }
  function getExpenses(ym) {
    return expenses.filter(e => e.due_date.startsWith(ym) && e.status === 'pago').reduce((a,b) => a + (parseFloat(b.amount) || 0), 0);
  }

  const saldoInicialFC = parseFloat(localStorage.getItem('vg_saldo_inicial') || '0');
  let cumulative = saldoInicialFC;
  const rows = months.map(ym => {
    const rev = editingRev[ym] !== undefined ? parseBRLInput(editingRev[ym]) : getRevenue(ym);
    const exp = getExpenses(ym);
    const result = rev - exp;
    cumulative += result;
    return { ym, rev, exp, result, cumulative };
  });

  const ytdRev = rows.reduce((a,r)=>a+r.rev,0);
  const ytdExp = rows.reduce((a,r)=>a+r.exp,0);
  const ytdResult = ytdRev - ytdExp;
  const best = rows.reduce((a,r)=>r.result>a.result?r:a, rows[0]);
  const worst = rows.reduce((a,r)=>r.result<a.result?r:a, rows[0]);

  async function saveRevenue(ym) {
    if (editingRev[ym] === undefined) return;
    setSaving(true);
    const amount = parseBRLInput(editingRev[ym]);
    const existing = revenue.find(r => r.month === ym);
    const user = (await sb.auth.getUser()).data.user;
    if (existing) {
      await sb.from('revenue').update({ amount, created_by: user.id }).eq('id', existing.id);
    } else {
      await sb.from('revenue').insert({ month: ym, amount, created_by: user.id });
    }
    setEditingRev(p => { const n={...p}; delete n[ym]; return n; });
    setSaving(false);
    toast('Receita atualizada!', 'success');
    onRefresh();
  }

  function exportCSV() {
    const header = 'Mês,Receita,Despesas,Resultado,Saldo Acumulado\n';
    const body = rows.map(r =>
      `${getFullMonthLabel(r.ym)},${r.rev.toFixed(2)},${r.exp.toFixed(2)},${r.result.toFixed(2)},${r.cumulative.toFixed(2)}`
    ).join('\n');
    const blob = new Blob([header+body], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href=url; a.download=`fluxo-${year}.csv`; a.click();
    URL.revokeObjectURL(url);
  }

  return (
    <div className="page">
      <div className="page-header" style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
        <div>
          <div className="page-title">Fluxo de Caixa</div>
          <div className="page-subtitle">Clique no campo Receita para editar</div>
        </div>
        <div style={{ display: 'flex', gap: 10, alignItems: 'center' }}>
          <button className="btn btn-ghost btn-sm" onClick={() => setYear(y=>y-1)}>◀</button>
          <span style={{ fontFamily: 'var(--font-mono)', fontWeight: 600 }}>{year}</span>
          <button className="btn btn-ghost btn-sm" onClick={() => setYear(y=>y+1)}>▶</button>
          <button className="btn btn-primary" onClick={() => setRevenueModal(true)}>+ Nova Receita</button>
          <button className="btn btn-secondary" onClick={exportCSV}>⬇ Exportar CSV</button>
        </div>
      </div>

      <div className="metrics-grid" style={{ gridTemplateColumns: 'repeat(5, 1fr)', marginBottom: 24 }}>
        <div className="metric-card">
          <div className="metric-label">YTD Receita</div>
          <div className="metric-value green">{fmtBRL(ytdRev)}</div>
        </div>
        <div className="metric-card">
          <div className="metric-label">YTD Despesas</div>
          <div className="metric-value">{fmtBRL(ytdExp)}</div>
        </div>
        <div className="metric-card">
          <div className="metric-label">YTD Resultado</div>
          <div className={`metric-value ${ytdResult>=0?'positive':'negative'}`}>{fmtBRLSigned(ytdResult)}</div>
        </div>
        <div className="metric-card">
          <div className="metric-label">Melhor Mês</div>
          <div className="metric-value green" style={{ fontSize: 15 }}>{best ? getMonthLabel(best.ym) : '—'}</div>
        </div>
        <div className="metric-card">
          <div className="metric-label">Pior Mês</div>
          <div className="metric-value negative" style={{ fontSize: 15 }}>{worst ? getMonthLabel(worst.ym) : '—'}</div>
        </div>
      </div>

      <div className="table-wrap">
        <table className="cf-table">
          <thead>
            <tr>
              <th>Mês</th>
              <th>Receita</th>
              <th>Despesas (Pagas)</th>
              <th>Resultado</th>
              <th>Saldo Acumulado</th>
            </tr>
          </thead>
          <tbody>
            {rows.map(r => (
              <tr key={r.ym} className={r.result >= 0 ? 'positive' : 'negative'}>
                <td>{getFullMonthLabel(r.ym)}</td>
                <td>
                  <input
                    className="inline-input"
                    value={editingRev[r.ym] !== undefined ? editingRev[r.ym] : r.rev.toFixed(2).replace('.',',')}
                    onChange={e => setEditingRev(p=>({...p,[r.ym]:e.target.value}))}
                    onBlur={() => saveRevenue(r.ym)}
                    onKeyDown={e => { if(e.key==='Enter') saveRevenue(r.ym); }}
                    style={{ color: 'var(--success)' }}
                  />
                </td>
                <td>{fmtBRL(r.exp)}</td>
                <td className="result" style={{ fontWeight: 600 }}>{fmtBRLSigned(r.result)}</td>
                <td className="acum" style={{ fontWeight: 600 }}>{fmtBRLSigned(r.cumulative)}</td>
              </tr>
            ))}
            <tr className="total">
              <td>TOTAL</td>
              <td className="mono">{fmtBRL(ytdRev)}</td>
              <td className="mono">{fmtBRL(ytdExp)}</td>
              <td className={`result mono ${ytdResult>=0?'':'negative'}`}>{fmtBRLSigned(ytdResult)}</td>
              <td className={`acum mono ${rows[11]?.cumulative>=0?'':'negative'}`}>{fmtBRLSigned(rows[11]?.cumulative||0)}</td>
            </tr>
          </tbody>
        </table>
      </div>
      {revenueModal && (
        <RevenueModal
          onSave={handleSaveRevenue}
          onClose={() => setRevenueModal(false)}
        />
      )}
    </div>
  );
}




/* ═══════════════════════════════════════════════════════
   MODULE — RECEBIMENTOS (Contas a Receber)
═══════════════════════════════════════════════════════ */
function Recebimentos({ receivables, setReceivables, revenue, setRevenue, onRefresh }) {
  const [modal, setModal] = useState(null);
  const [confirm, setConfirm] = useState(null);
  const [receberModal, setReceberModal] = useState(null);

  const pending = receivables.filter(r => r.status === 'pendente').sort((a,b) => a.expected_date.localeCompare(b.expected_date));
  const received = receivables.filter(r => r.status === 'recebido').sort((a,b) => b.received_date.localeCompare(a.received_date));

  const totalPending = pending.reduce((a,b) => a + parseFloat(b.amount), 0);
  const totalReceived = received.reduce((a,b) => a + parseFloat(b.amount), 0);

  async function handleSave(payload) {
    const user = (await sb.auth.getUser()).data.user;
    if (modal.rec) {
      const { data, error } = await sb.from('receivables').update({ ...payload, created_by: user.id }).eq('id', modal.rec.id).select().single();
      if (error) { toast('Erro: ' + error.message, 'error'); return; }
      if (data) setReceivables(prev => prev.map(r => r.id === data.id ? data : r));
    } else {
      const { data, error } = await sb.from('receivables').insert({ ...payload, created_by: user.id }).select().single();
      if (error) { toast('Erro: ' + error.message, 'error'); return; }
      if (data) setReceivables(prev => [...prev, data]);
    }
    toast('Salvo!', 'success');
    setModal(null);
  }

  async function handleReceber(rec, receivedDate) {
    // Mark as received
    const { data, error } = await sb.from('receivables').update({ status: 'recebido', received_date: receivedDate }).eq('id', rec.id).select().single();
    if (error) { toast('Erro: ' + error.message, 'error'); return; }
    if (data) setReceivables(prev => prev.map(r => r.id === data.id ? data : r));

    // Auto-create revenue entry
    const user = (await sb.auth.getUser()).data.user;
    const revPayload = {
      date: receivedDate,
      month: receivedDate.slice(0,7),
      amount: rec.amount,
      tipo: 'operacional',
      cliente: rec.app,
      notes: `Recebimento ${rec.app} · Previsto: ${fmtDate(rec.expected_date)}`,
      created_by: user.id,
    };
    const { data: revData } = await sb.from('revenue').insert(revPayload).select().single();
    if (revData) setRevenue(prev => [...prev, revData]);

    toast('Recebimento registrado e receita lançada!', 'success');
    setReceberModal(null);
    onRefresh();
  }

  async function handleDelete(id) {
    await sb.from('receivables').delete().eq('id', id);
    setReceivables(prev => prev.filter(r => r.id !== id));
    toast('Excluído.', 'info');
    setConfirm(null);
  }

  const today = todayISO();

  return (
    <div className="page">
      <div className="page-header" style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
        <div>
          <div className="page-title">A Receber</div>
          <div className="page-subtitle">Recebimentos futuros das plataformas de delivery</div>
        </div>
        <button className="btn btn-primary" onClick={() => setModal({ mode: 'new' })}>+ Novo Recebimento</button>
      </div>

      <div className="weekly-summary" style={{ marginBottom: 16 }}>
        <div>
          <div className="weekly-stat-label">A Receber</div>
          <div className="weekly-stat-value">{fmtBRL(totalPending)}</div>
        </div>
        <div>
          <div className="weekly-stat-label">Pendentes</div>
          <div className="weekly-stat-value">{pending.length}</div>
        </div>
        <div>
          <div className="weekly-stat-label">Recebido (histórico)</div>
          <div className="weekly-stat-value pos">{fmtBRL(totalReceived)}</div>
        </div>
      </div>

      {/* Pending */}
      <div style={{ marginBottom: 8, fontWeight: 700, fontFamily: 'var(--font-display)', fontSize: 15 }}>Pendentes</div>
      <div className="table-wrap" style={{ marginBottom: 20 }}>
        <table>
          <thead>
            <tr><th>App / Origem</th><th>Valor</th><th>Data Prevista</th><th>Situação</th><th>Observações</th><th>Ações</th></tr>
          </thead>
          <tbody>
            {pending.length === 0 ? (
              <tr><td colSpan={6} style={{ textAlign: 'center', padding: 32, color: 'var(--muted)' }}>Nenhum recebimento pendente.</td></tr>
            ) : pending.map(r => {
              const overdue = r.expected_date < today;
              const daysLeft = Math.round((new Date(r.expected_date) - new Date(today)) / 86400000);
              return (
                <tr key={r.id} className={overdue ? 'overdue' : ''}>
                  <td style={{ fontWeight: 600 }}>{r.app}</td>
                  <td className="mono" style={{ fontWeight: 700, color: 'var(--success)' }}>{fmtBRL(r.amount)}</td>
                  <td style={{ fontSize: 12, color: overdue ? 'var(--danger)' : 'inherit' }}>
                    {fmtDate(r.expected_date)}
                    {!overdue && daysLeft <= 7 && <span style={{ marginLeft: 6, fontSize: 10, color: 'var(--warning)' }}>em {daysLeft}d</span>}
                    {overdue && <span style={{ marginLeft: 6, fontSize: 10, color: 'var(--danger)' }}>atrasado</span>}
                  </td>
                  <td><span className="badge badge-pending">Pendente</span></td>
                  <td style={{ fontSize: 12, color: 'var(--muted)' }}>{r.notes || '—'}</td>
                  <td>
                    <div style={{ display: 'flex', gap: 6 }}>
                      <button className="btn btn-primary btn-sm" onClick={() => setReceberModal(r)}>✓ Recebido</button>
                      <button className="btn btn-ghost btn-sm" onClick={() => setModal({ mode: 'edit', rec: r })}>✎</button>
                      <button className="btn btn-ghost btn-sm" style={{ color: 'var(--danger)' }} onClick={() => setConfirm(r)}>✕</button>
                    </div>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>

      {/* Received history */}
      {received.length > 0 && (
        <>
          <div style={{ marginBottom: 8, fontWeight: 700, fontFamily: 'var(--font-display)', fontSize: 15 }}>Histórico Recebido</div>
          <div className="table-wrap">
            <table>
              <thead>
                <tr><th>App</th><th>Valor</th><th>Previsto</th><th>Recebido em</th><th>Ações</th></tr>
              </thead>
              <tbody>
                {received.slice(0,20).map(r => (
                  <tr key={r.id} className="paid">
                    <td style={{ fontWeight: 600 }}>{r.app}</td>
                    <td className="mono amount-cell">{fmtBRL(r.amount)}</td>
                    <td style={{ fontSize: 12, color: 'var(--muted)' }}>{fmtDate(r.expected_date)}</td>
                    <td style={{ fontSize: 12 }}>{fmtDate(r.received_date)}</td>
                    <td>
                      <button className="btn btn-ghost btn-sm" style={{ color: 'var(--danger)' }} onClick={() => setConfirm(r)}>✕</button>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </>
      )}

      {modal && <RecebimentoModal rec={modal.rec} onSave={handleSave} onClose={() => setModal(null)} />}

      {receberModal && (
        <ReceberConfirmModal
          rec={receberModal}
          onConfirm={handleReceber}
          onClose={() => setReceberModal(null)}
        />
      )}

      {confirm && (
        <ConfirmDialog
          title="Excluir Recebimento"
          msg={`Excluir recebimento de ${fmtBRL(confirm.amount)} (${confirm.app})?`}
          onConfirm={() => handleDelete(confirm.id)}
          onCancel={() => setConfirm(null)}
        />
      )}

      <button className="fab" onClick={() => setModal({ mode: 'new' })}>+</button>
    </div>
  );
}

function RecebimentoModal({ rec, onSave, onClose }) {
  const [form, setForm] = useState({
    app: rec?.app || '',
    amount: rec ? rec.amount.toString().replace('.',',') : '',
    expected_date: rec?.expected_date || todayISO(),
    notes: rec?.notes || '',
  });
  const [saving, setSaving] = useState(false);
  function set(k,v) { setForm(p=>({...p,[k]:v})); }

  async function handleSave() {
    if (!form.app || !form.amount || !form.expected_date) { toast('Preencha todos os campos.','error'); return; }
    setSaving(true);
    await onSave({ app: form.app, amount: parseBRLInput(form.amount), expected_date: form.expected_date, notes: form.notes||null });
    setSaving(false);
  }

  useEffect(() => {
    function onKey(e) { if (e.key==='Escape') onClose(); }
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, []);

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-box" style={{ maxWidth: 440 }} onClick={e=>e.stopPropagation()}>
        <div className="modal-header">
          <div className="modal-title">{rec ? 'Editar Recebimento' : 'Novo Recebimento'}</div>
          <button className="modal-close" onClick={onClose}>✕</button>
        </div>
        <div className="modal-body">
          <div className="form-grid">
            <div className="form-group full">
              <label className="form-label">App / Origem *</label>
              <select className="form-control" value={form.app} onChange={e=>set('app',e.target.value)}>
                <option value="">Selecionar...</option>
                {['iFood','Rappi','Keeta','99Food','Delivery próprio','Outros'].map(a=><option key={a}>{a}</option>)}
              </select>
            </div>
            <div className="form-group">
              <label className="form-label">Valor (R$) *</label>
              <input className="form-control mono" value={form.amount} onChange={e=>set('amount',e.target.value)} placeholder="0,00" autoFocus />
            </div>
            <div className="form-group">
              <label className="form-label">Data Prevista *</label>
              <input className="form-control" type="date" value={form.expected_date} onChange={e=>set('expected_date',e.target.value)} />
            </div>
            <div className="form-group full">
              <label className="form-label">Observações</label>
              <textarea className="form-control" rows={2} value={form.notes} onChange={e=>set('notes',e.target.value)} style={{resize:'vertical'}} />
            </div>
          </div>
        </div>
        <div className="modal-footer">
          <button className="btn btn-secondary" onClick={onClose}>Cancelar</button>
          <button className="btn btn-primary" onClick={handleSave} disabled={saving}>{saving?'Salvando...':'Salvar'}</button>
        </div>
      </div>
    </div>
  );
}

function ReceberConfirmModal({ rec, onConfirm, onClose }) {
  const [receivedDate, setReceivedDate] = useState(todayISO());
  const [saving, setSaving] = useState(false);

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-box" style={{ maxWidth: 420 }} onClick={e=>e.stopPropagation()}>
        <div className="modal-header">
          <div className="modal-title">Confirmar Recebimento</div>
          <button className="modal-close" onClick={onClose}>✕</button>
        </div>
        <div className="modal-body">
          <div style={{ marginBottom: 20 }}>
            <div style={{ fontWeight: 600 }}>{rec.app}</div>
            <div style={{ fontFamily: 'var(--font-mono)', fontSize: 24, fontWeight: 700, color: 'var(--success)', margin: '8px 0' }}>{fmtBRL(rec.amount)}</div>
            <div style={{ fontSize: 12, color: 'var(--muted)' }}>Previsto para {fmtDate(rec.expected_date)}</div>
          </div>
          <div className="form-group">
            <label className="form-label">Data do Recebimento *</label>
            <input className="form-control" type="date" value={receivedDate} onChange={e=>setReceivedDate(e.target.value)} autoFocus />
            <div style={{ fontSize: 11, color: 'var(--muted)', marginTop: 4 }}>Uma receita será lançada automaticamente nesta data.</div>
          </div>
        </div>
        <div className="modal-footer">
          <button className="btn btn-secondary" onClick={onClose}>Cancelar</button>
          <button className="btn btn-primary" onClick={async()=>{setSaving(true);await onConfirm(rec,receivedDate);setSaving(false);}} disabled={saving||!receivedDate}>
            {saving?'Registrando...':'✓ Confirmar Recebimento'}
          </button>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════
   MODULE — SOLICITAÇÕES (Aprovação de Despesas)
═══════════════════════════════════════════════════════ */
function Solicitacoes({ requests, setRequests, expenses, setExpenses, suppliers, isOwner, session, onRefresh }) {
  const [modal, setModal] = useState(false);
  const [confirmDelete, setConfirmDelete] = useState(null);
  const [reviewModal, setReviewModal] = useState(null);

  async function handleDelete(id) {
    const { error } = await sb.from('expense_requests').delete().eq('id', id);
    if (error) { toast('Erro ao eliminar: ' + error.message, 'error'); return; }
    setRequests(prev => prev.filter(r => r.id !== id));
    setConfirmDelete(null);
    toast('Solicitação eliminada.', 'success');
  }

  const pending = requests.filter(r => r.status === 'pendente');
  const reviewed = requests.filter(r => r.status !== 'pendente');

  async function handleSubmit(payload) {
    const user = (await sb.auth.getUser()).data.user;
    const { data, error } = await sb.from('expense_requests').insert({ ...payload, requested_by: user.id }).select().single();
    if (error) { toast('Erro: ' + error.message, 'error'); return; }
    if (data) setRequests(prev => [data, ...prev]);
    toast('Solicitação enviada!', 'success');
    setModal(false);
  }

  async function handleApprove(req, note) {
    const user = (await sb.auth.getUser()).data.user;
    // Update request status
    const { data, error } = await sb.from('expense_requests').update({
      status: 'aprovado', reviewed_by: user.id, reviewed_at: new Date().toISOString(), review_note: note||null
    }).eq('id', req.id).select().single();
    if (error) { toast('Erro: ' + error.message, 'error'); return; }
    if (data) setRequests(prev => prev.map(r => r.id === data.id ? data : r));

    // Create expense from request
    const expPayload = {
      supplier_name: req.supplier_name, category: req.category,
      expense_type: req.expense_type, amount: req.amount,
      due_date: req.due_date, payment_method: req.payment_method,
      notes: req.notes, status: 'pendente', created_by: user.id,
    };
    const { data: expData } = await sb.from('expenses').insert(expPayload).select().single();
    if (expData) setExpenses(prev => [expData, ...prev]);

    toast('Aprovado e despesa criada!', 'success');
    setReviewModal(null);
    onRefresh();
  }

  async function handleReject(req, note) {
    const user = (await sb.auth.getUser()).data.user;
    const { data, error } = await sb.from('expense_requests').update({
      status: 'rejeitado', reviewed_by: user.id, reviewed_at: new Date().toISOString(), review_note: note||null
    }).eq('id', req.id).select().single();
    if (error) { toast('Erro: ' + error.message, 'error'); return; }
    if (data) setRequests(prev => prev.map(r => r.id === data.id ? data : r));
    toast('Solicitação rejeitada.', 'info');
    setReviewModal(null);
  }

  return (
    <div className="page">
      <div className="page-header" style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
        <div>
          <div className="page-title">Solicitações</div>
          <div className="page-subtitle">{isOwner ? 'Aprovação de despesas solicitadas pela equipe' : 'Solicite aprovação para despesas'}</div>
        </div>
        <button className="btn btn-primary" onClick={() => setModal(true)}>+ Nova Solicitação</button>
      </div>

      {isOwner && pending.length > 0 && (
        <div style={{ background: '#fff3e0', border: '1px solid var(--warning)', borderRadius: 'var(--radius)', padding: '12px 16px', marginBottom: 16, fontSize: 13, fontWeight: 600 }}>
          ⏳ {pending.length} solicitação{pending.length > 1 ? 'ões' : ''} aguardando sua aprovação
        </div>
      )}

      <div style={{ marginBottom: 8, fontWeight: 700, fontFamily: 'var(--font-display)', fontSize: 15 }}>
        {isOwner ? 'Aguardando Aprovação' : 'Minhas Solicitações'}
      </div>
      <div className="table-wrap" style={{ marginBottom: 20 }}>
        <table>
          <thead>
            <tr><th>Fornecedor</th><th>Categoria</th><th>Valor</th><th>Vencimento</th><th>Status</th><th>Ações</th></tr>
          </thead>
          <tbody>
            {pending.length === 0 ? (
              <tr><td colSpan={6} style={{ textAlign: 'center', padding: 32, color: 'var(--muted)' }}>Nenhuma solicitação pendente.</td></tr>
            ) : pending.map(r => (
              <tr key={r.id}>
                <td style={{ fontWeight: 600 }}>{r.supplier_name}</td>
                <td style={{ fontSize: 12 }}>{r.category}</td>
                <td className="mono" style={{ fontWeight: 600 }}>{fmtBRL(r.amount)}</td>
                <td style={{ fontSize: 12 }}>{fmtDate(r.due_date)}</td>
                <td><span className="badge badge-pending">Pendente</span></td>
                <td>
                  <div style={{ display: 'flex', gap: 6, alignItems: 'center' }}>
                    {isOwner ? (
                      <button className="btn btn-primary btn-sm" onClick={() => setReviewModal(r)}>Revisar</button>
                    ) : (
                      <span style={{ fontSize: 11, color: 'var(--muted)' }}>Aguardando owner</span>
                    )}
                    {isOwner && (
                      <button className="btn btn-sm" style={{ background: 'var(--danger)', color: '#fff', padding: '3px 8px' }}
                        onClick={() => setConfirmDelete(r.id)}>✕</button>
                    )}
                  </div>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {reviewed.length > 0 && (
        <>
          <div style={{ marginBottom: 8, fontWeight: 700, fontFamily: 'var(--font-display)', fontSize: 15 }}>Histórico</div>
          <div className="table-wrap">
            <table>
              <thead>
                <tr><th>Fornecedor</th><th>Valor</th><th>Status</th><th>Nota</th><th></th></tr>
              </thead>
              <tbody>
                {reviewed.slice(0,20).map(r => (
                  <tr key={r.id}>
                    <td style={{ fontWeight: 600 }}>{r.supplier_name}</td>
                    <td className="mono">{fmtBRL(r.amount)}</td>
                    <td>
                      <span className="badge" style={{
                        background: r.status==='aprovado' ? '#e8f5e9' : '#fdecea',
                        color: r.status==='aprovado' ? '#1b5e20' : 'var(--danger)'
                      }}>
                        {r.status==='aprovado' ? 'Aprovado' : 'Rejeitado'}
                      </span>
                    </td>
                    <td style={{ fontSize: 11, color: 'var(--muted)' }}>{r.review_note || '—'}</td>
                    <td>
                      {isOwner && (
                        <button className="btn btn-sm" style={{ background: 'var(--danger)', color: '#fff', padding: '3px 8px', fontSize: 11 }}
                          onClick={() => setConfirmDelete(r.id)}>✕</button>
                      )}
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </>
      )}

      {confirmDelete && (
        <div className="modal-overlay" onClick={() => setConfirmDelete(null)}>
          <div className="confirm-dialog" onClick={e => e.stopPropagation()}>
            <div className="confirm-title">Eliminar solicitação?</div>
            <div className="confirm-msg">Esta ação é irreversível.</div>
            <div style={{ display: 'flex', gap: 10 }}>
              <button className="btn btn-outline" style={{ flex: 1 }} onClick={() => setConfirmDelete(null)}>Cancelar</button>
              <button className="btn" style={{ flex: 1, background: 'var(--danger)', color: '#fff' }}
                onClick={() => handleDelete(confirmDelete)}>Eliminar</button>
            </div>
          </div>
        </div>
      )}
      {modal && <SolicitacaoModal suppliers={suppliers} onSave={handleSubmit} onClose={() => setModal(false)} />}
      {reviewModal && (
        <ReviewModal
          req={reviewModal}
          onApprove={handleApprove}
          onReject={handleReject}
          onClose={() => setReviewModal(null)}
        />
      )}
    </div>
  );
}

function SolicitacaoModal({ suppliers, onSave, onClose }) {
  const { expenseCategories } = useCategories();
  const [form, setForm] = useState({
    supplier_name: '', category: '', expense_type: '',
    amount: '', due_date: todayISO(), payment_method: '', notes: '',
  });
  const [saving, setSaving] = useState(false);
  const [showSug, setShowSug] = useState(false);
  function set(k,v) { setForm(p=>({...p,[k]:v})); }
  const filtered = suppliers.filter(s => form.supplier_name && s.name.toLowerCase().includes(form.supplier_name.toLowerCase()));

  async function handleSave() {
    if (!form.supplier_name || !form.category || !form.amount || !form.due_date) { toast('Preencha os campos obrigatórios.','error'); return; }
    setSaving(true);
    await onSave({ ...form, amount: parseBRLInput(form.amount), payment_method: form.payment_method||null, expense_type: form.expense_type||null, notes: form.notes||null });
    setSaving(false);
  }

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-box" onClick={e=>e.stopPropagation()}>
        <div className="modal-header">
          <div className="modal-title">Nova Solicitação de Despesa</div>
          <button className="modal-close" onClick={onClose}>✕</button>
        </div>
        <div className="modal-body">
          <div className="form-grid">
            <div className="form-group full" style={{ position: 'relative' }}>
              <label className="form-label">Fornecedor *</label>
              <input className="form-control" value={form.supplier_name}
                onChange={e=>{set('supplier_name',e.target.value);setShowSug(true);}}
                onBlur={()=>setTimeout(()=>setShowSug(false),150)} />
              {showSug && filtered.length > 0 && (
                <div style={{ position:'absolute',top:'100%',left:0,right:0,background:'#fff',border:'1px solid var(--border)',borderTop:'none',zIndex:10,maxHeight:140,overflowY:'auto' }}>
                  {filtered.map(s=>(
                    <div key={s.id} style={{ padding:'9px 12px',cursor:'pointer',fontSize:13 }}
                      onMouseDown={()=>{set('supplier_name',s.name);setShowSug(false);}}>
                      <strong>{s.name}</strong> <span style={{color:'var(--muted)',fontSize:11}}>{s.category}</span>
                    </div>
                  ))}
                </div>
              )}
            </div>
            <div className="form-group">
              <label className="form-label">Categoria *</label>
              <select className="form-control" value={form.category} onChange={e=>set('category',e.target.value)}>
                <option value="">Selecionar...</option>
                {expenseCategories.map(c=><option key={c}>{c}</option>)}
              </select>
            </div>
            <div className="form-group">
              <label className="form-label">Tipo de Gasto</label>
              <input className="form-control" value={form.expense_type} onChange={e=>set('expense_type',e.target.value)} placeholder="Ex: Mussarela" />
            </div>
            <div className="form-group">
              <label className="form-label">Valor (R$) *</label>
              <input className="form-control mono" value={form.amount} onChange={e=>set('amount',e.target.value)} placeholder="0,00" />
            </div>
            <div className="form-group">
              <label className="form-label">Vencimento *</label>
              <input className="form-control" type="date" value={form.due_date} onChange={e=>set('due_date',e.target.value)} />
            </div>
            <div className="form-group full">
              <label className="form-label">Observações / Justificativa</label>
              <textarea className="form-control" rows={2} value={form.notes} onChange={e=>set('notes',e.target.value)} placeholder="Descreva o motivo da compra..." style={{resize:'vertical'}} />
            </div>
          </div>
        </div>
        <div className="modal-footer">
          <button className="btn btn-secondary" onClick={onClose}>Cancelar</button>
          <button className="btn btn-primary" onClick={handleSave} disabled={saving}>{saving?'Enviando...':'Enviar Solicitação'}</button>
        </div>
      </div>
    </div>
  );
}

function ReviewModal({ req, onApprove, onReject, onClose }) {
  const [note, setNote] = useState('');
  const [saving, setSaving] = useState(false);

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-box" style={{ maxWidth: 480 }} onClick={e=>e.stopPropagation()}>
        <div className="modal-header">
          <div className="modal-title">Revisar Solicitação</div>
          <button className="modal-close" onClick={onClose}>✕</button>
        </div>
        <div className="modal-body">
          <div style={{ background:'#f5f2ed',borderRadius:'var(--radius)',padding:'14px 16px',marginBottom:16 }}>
            <div style={{ fontWeight:600,fontSize:15,marginBottom:4 }}>{req.supplier_name}</div>
            <div style={{ fontFamily:'var(--font-mono)',fontSize:20,fontWeight:700,color:'var(--black)',marginBottom:6 }}>{fmtBRL(req.amount)}</div>
            <div style={{ fontSize:12,color:'var(--muted)' }}>{req.category}{req.expense_type?' · '+req.expense_type:''} · Vence {fmtDate(req.due_date)}</div>
            {req.notes && <div style={{ marginTop:8,fontSize:12,fontStyle:'italic' }}>"{req.notes}"</div>}
          </div>
          <div className="form-group">
            <label className="form-label">Nota (opcional)</label>
            <textarea className="form-control" rows={2} value={note} onChange={e=>setNote(e.target.value)} placeholder="Comentário para a equipe..." style={{resize:'vertical'}} />
          </div>
        </div>
        <div className="modal-footer">
          <button className="btn btn-danger" onClick={async()=>{setSaving(true);await onReject(req,note);setSaving(false);}} disabled={saving}>✕ Rejeitar</button>
          <button className="btn btn-primary" onClick={async()=>{setSaving(true);await onApprove(req,note);setSaving(false);}} disabled={saving}>✓ Aprovar e Criar Despesa</button>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════
   MODULE — RECEITAS
═══════════════════════════════════════════════════════ */
function Receitas({ revenue, setRevenue, onRefresh, session }) {
  const [modal, setModal] = useState(null); // null | {mode:'new'} | {mode:'edit', rec}
  const [confirm, setConfirm] = useState(null);
  const [filter, setFilter] = useState({ type: 'todos', from: '', to: '', cliente: '' });

  const filtered = revenue.filter(r => {
    if (filter.type !== 'todos' && r.tipo !== filter.type) return false;
    if (filter.cliente && r.cliente !== filter.cliente) return false;
    if (filter.from) {
      const d = r.date || (r.month + '-01');
      if (d < filter.from) return false;
    }
    if (filter.to) {
      const d = r.date || (r.month + '-28');
      if (d > filter.to) return false;
    }
    return true;
  }).sort((a,b) => {
    const da = a.date || (a.month + '-01');
    const db = b.date || (b.month + '-01');
    return db.localeCompare(da);
  });

  const totalOp = filtered.filter(r => r.tipo === 'operacional' || !r.tipo).reduce((a,b) => a + parseFloat(b.amount), 0);
  const totalNop = filtered.filter(r => r.tipo === 'nao_operacional').reduce((a,b) => a + parseFloat(b.amount), 0);
  const total = filtered.reduce((a,b) => a + parseFloat(b.amount), 0);

  async function handleSave(payload) {
    const user = (await sb.auth.getUser()).data.user;
    if (modal.rec) {
      const { data, error } = await sb.from('revenue').update({ ...payload, created_by: user.id }).eq('id', modal.rec.id).select().single();
      if (error) { toast('Erro: ' + error.message, 'error'); return; }
      if (data) setRevenue(prev => prev.map(r => r.id === data.id ? data : r));
    } else {
      const { data, error } = await sb.from('revenue').insert({ ...payload, created_by: user.id }).select().single();
      if (error) { toast('Erro: ' + error.message, 'error'); return; }
      if (data) setRevenue(prev => [data, ...prev]);
    }
    toast('Receita salva!', 'success');
    setModal(null);
    onRefresh();
  }

  async function handleDelete(id) {
    const { error } = await sb.from('revenue').delete().eq('id', id);
    if (error) { toast('Erro: ' + error.message, 'error'); return; }
    setRevenue(prev => prev.filter(r => r.id !== id));
    toast('Receita excluída.', 'info');
    setConfirm(null);
    onRefresh();
  }

  return (
    <div className="page">
      <div className="page-header" style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
        <div>
          <div className="page-title">Receitas</div>
          <div className="page-subtitle">Registro de receitas operacionais e não operacionais</div>
        </div>
        <button className="btn btn-primary" onClick={() => setModal({ mode: 'new' })}>+ Nova Receita</button>
      </div>

      {/* Summary bar */}
      <div className="weekly-summary" style={{ marginBottom: 16 }}>
        <div>
          <div className="weekly-stat-label">Total do Período</div>
          <div className="weekly-stat-value pos">{fmtBRL(total)}</div>
        </div>
        <div>
          <div className="weekly-stat-label">Operacional</div>
          <div className="weekly-stat-value pos">{fmtBRL(totalOp)}</div>
        </div>
        <div>
          <div className="weekly-stat-label">Não Operacional</div>
          <div className="weekly-stat-value">{fmtBRL(totalNop)}</div>
        </div>
        <div>
          <div className="weekly-stat-label">Registros</div>
          <div className="weekly-stat-value">{filtered.length}</div>
        </div>
      </div>

      {/* Filters */}
      <div className="filters-bar">
        <input className="form-control" type="date" value={filter.from} onChange={e => setFilter(p => ({ ...p, from: e.target.value }))} placeholder="De" />
        <input className="form-control" type="date" value={filter.to} onChange={e => setFilter(p => ({ ...p, to: e.target.value }))} placeholder="Até" />
        <select className="form-control" value={filter.type} onChange={e => setFilter(p => ({ ...p, type: e.target.value }))}>
          <option value="todos">Todos os tipos</option>
          <option value="operacional">Operacional</option>
          <option value="nao_operacional">Não Operacional</option>
        </select>
        <select className="form-control" value={filter.cliente} onChange={e => setFilter(p => ({ ...p, cliente: e.target.value }))}>
          <option value="">Todos os clientes</option>
          <option value="Delivery próprio">Delivery próprio</option>
          <option value="Ifood">Ifood</option>
          <option value="Keeta">Keeta</option>
          <option value="99Food">99Food</option>
          <option value="Rappi">Rappi</option>
          <option value="Outros">Outros</option>
        </select>
        <button className="btn btn-ghost btn-sm" onClick={() => setFilter({ type: 'todos', from: '', to: '', cliente: '' })}>Limpar</button>
      </div>

      {/* Table */}
      <div className="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Data</th>
              <th>Cliente</th>
              <th>Tipo</th>
              <th>Valor</th>
              <th>Observações</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody>
            {filtered.length === 0 ? (
              <tr><td colSpan={5} style={{ textAlign: 'center', padding: 40, color: 'var(--muted)' }}>
                Nenhuma receita registrada. Clique em "+ Nova Receita" para começar.
              </td></tr>
            ) : filtered.map(r => (
              <tr key={r.id}>
                <td style={{ fontWeight: 600 }}>{r.date ? fmtDate(r.date) : getFullMonthLabel(r.month)}</td>
                <td style={{ fontSize: 12 }}>{r.cliente || '—'}</td>
                <td>
                  <span className="badge" style={{
                    background: r.tipo === 'nao_operacional' ? '#f0f0f0' : '#e8f5e9',
                    color: r.tipo === 'nao_operacional' ? '#555' : '#1b5e20'
                  }}>
                    {r.tipo === 'nao_operacional' ? 'Não Operacional' : 'Operacional'}
                  </span>
                </td>
                <td className="mono" style={{ fontWeight: 600, color: 'var(--success)' }}>{fmtBRL(r.amount)}</td>
                <td style={{ fontSize: 12, color: 'var(--muted)', maxWidth: 280, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{r.notes || '—'}</td>
                <td>
                  <div style={{ display: 'flex', gap: 6 }}>
                    <button className="btn btn-ghost btn-sm" onClick={() => setModal({ mode: 'edit', rec: r })}>✎</button>
                    <button className="btn btn-ghost btn-sm" style={{ color: 'var(--danger)' }} onClick={() => setConfirm(r)}>✕</button>
                  </div>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {/* Modal */}
      {modal && (
        <ReceitaModal
          rec={modal.rec}
          onSave={handleSave}
          onClose={() => setModal(null)}
        />
      )}

      {/* Confirm delete */}
      {confirm && (
        <ConfirmDialog
          title="Excluir Receita"
          msg={`Deseja excluir a receita de ${fmtBRL(confirm.amount)} de ${confirm.date ? fmtDate(confirm.date) : getFullMonthLabel(confirm.month)}? Esta ação não pode ser desfeita.`}
          onConfirm={() => handleDelete(confirm.id)}
          onCancel={() => setConfirm(null)}
        />
      )}

      <button className="fab" onClick={() => setModal({ mode: 'new' })} title="Nova Receita">+</button>
    </div>
  );
}

function ReceitaModal({ rec, onSave, onClose }) {
  const [form, setForm] = useState({
    date: rec?.date || todayISO(),
    tipo: rec?.tipo || 'operacional',
    cliente: rec?.cliente || '',
    amount: rec ? rec.amount.toString().replace('.', ',') : '',
    notes: rec?.notes || '',
  });
  const [saving, setSaving] = useState(false);

  function set(k, v) { setForm(p => ({ ...p, [k]: v })); }

  async function handleSave() {
    if (!form.date || !form.amount) { toast('Preencha data e valor.', 'error'); return; }
    setSaving(true);
    await onSave({
      date: form.date,
      month: form.date.slice(0, 7),
      tipo: form.tipo,
      cliente: form.cliente || null,
      amount: parseBRLInput(form.amount),
      notes: form.notes || null,
    });
    setSaving(false);
  }

  useEffect(() => {
    function onKey(e) { if (e.key === 'Escape') onClose(); }
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, []);

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-box" style={{ maxWidth: 440 }} onClick={e => e.stopPropagation()}>
        <div className="modal-header">
          <div className="modal-title">{rec ? 'Editar Receita' : 'Nova Receita'}</div>
          <button className="modal-close" onClick={onClose}>✕</button>
        </div>
        <div className="modal-body">
          <div className="form-grid">
            <div className="form-group">
              <label className="form-label">Data *</label>
              <input className="form-control" type="date" value={form.date} onChange={e => set('date', e.target.value)} autoFocus />
            </div>
            <div className="form-group">
              <label className="form-label">Tipo *</label>
              <select className="form-control" value={form.tipo} onChange={e => set('tipo', e.target.value)}>
                <option value="operacional">Operacional</option>
                <option value="nao_operacional">Não Operacional</option>
              </select>
            </div>
            <div className="form-group full">
              <label className="form-label">Cliente</label>
              <select className="form-control" value={form.cliente} onChange={e => set('cliente', e.target.value)}>
                <option value="">Selecionar...</option>
                <option value="Delivery próprio">Delivery próprio</option>
                <option value="Ifood">Ifood</option>
                <option value="Keeta">Keeta</option>
                <option value="99Food">99Food</option>
                <option value="Rappi">Rappi</option>
                <option value="Outros">Outros</option>
              </select>
            </div>
            <div className="form-group full">
              <label className="form-label">Valor (R$) *</label>
              <input className="form-control mono" value={form.amount} onChange={e => set('amount', e.target.value)} placeholder="0,00" />
            </div>
            <div className="form-group full">
              <label className="form-label">Observações</label>
              <textarea className="form-control" rows={2} value={form.notes} onChange={e => set('notes', e.target.value)} placeholder="Ex: Vendas do dia, receita de aluguel..." style={{ resize: 'vertical' }} />
            </div>
          </div>
        </div>
        <div className="modal-footer">
          <button className="btn btn-secondary" onClick={onClose}>Cancelar</button>
          <button className="btn btn-primary" onClick={handleSave} disabled={saving}>
            {saving ? 'Salvando...' : 'Salvar Receita'}
          </button>
        </div>
      </div>
    </div>
  );
}


/* ═══════════════════════════════════════════════════════
   NÍVEL 2 — DRE MENSAL
═══════════════════════════════════════════════════════ */
function DREMensal({ expenses, revenue, expenseItems }) {
  const now = new Date();
  const months12 = Array.from({length:12},(_,i) => {
    const d = new Date(now.getFullYear(), now.getMonth()-11+i, 1);
    return monthISO(d);
  });
  const [selectedMonth, setSelectedMonth] = useState(monthISO(now));

  function revForMonth(ym) {
    return revenue.filter(r => {
      const key = r.date ? r.date : (r.month + '-01');
      return key.startsWith(ym);
    }).reduce((a,b) => a + (parseFloat(b.amount)||0), 0);
  }

  function expForCat(ym, cats) {
    return expenses.filter(e => {
      const date = e.paid_date || e.due_date;
      return date.startsWith(ym) && cats.includes(e.category);
    }).reduce((a,b) => a + (parseFloat(b.amount)||0), 0);
  }

  const receitaBruta = revForMonth(selectedMonth);
  const receitaNaoOp = revenue.filter(r => {
    const key = r.date ? r.date : (r.month + '-01');
    return key.startsWith(selectedMonth) && r.tipo === 'nao_operacional';
  }).reduce((a,b) => a + (parseFloat(b.amount)||0), 0);
  const receitaOp = receitaBruta - receitaNaoOp;

  const cmv = expForCat(selectedMonth, ['Compras']);
  const lucroBruto = receitaOp - cmv;
  const margemBruta = receitaOp > 0 ? (lucroBruto/receitaOp*100) : 0;

  const salarios = expForCat(selectedMonth, ['Salários']);
  const fixos = expForCat(selectedMonth, ['Gastos Fixos']);
  const variaveis = expForCat(selectedMonth, ['Gastos Variáveis']);
  const gerais = expForCat(selectedMonth, ['Gastos Gerais']);
  const totalOpEx = salarios + fixos + variaveis + gerais;

  const ebitda = lucroBruto - totalOpEx;
  const impostos = expForCat(selectedMonth, ['Impostos']);
  const lucroLiquido = ebitda - impostos;
  const margemLiquida = receitaOp > 0 ? (lucroLiquido/receitaOp*100) : 0;

  const rows = [
    { label: 'Receita Operacional Bruta', value: receitaOp, bold: true, positive: true },
    { label: 'CMV — Compras e Insumos', value: -cmv, indent: true },
    { label: 'Lucro Bruto', value: lucroBruto, bold: true, margin: margemBruta, divider: true },
    { label: 'Salários', value: -salarios, indent: true },
    { label: 'Gastos Fixos', value: -fixos, indent: true },
    { label: 'Gastos Variáveis', value: -variaveis, indent: true },
    { label: 'Gastos Gerais', value: -gerais, indent: true },
    { label: 'Total Despesas Operacionais', value: -totalOpEx, bold: true },
    { label: 'EBITDA', value: ebitda, bold: true, divider: true },
    { label: 'Impostos', value: -impostos, indent: true },
    { label: 'Lucro Líquido', value: lucroLiquido, bold: true, margin: margemLiquida, divider: true, highlight: true },
    ...(receitaNaoOp > 0 ? [{ label: 'Receitas Não Operacionais', value: receitaNaoOp, indent: true, muted: true }] : []),
  ];

  return (
    <div className="chart-card">
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 20 }}>
        <div>
          <div className="chart-title">DRE — Demonstrativo de Resultado</div>
          <div className="chart-sub">Resultado econômico do período</div>
        </div>
        <select className="form-control" style={{ width: 180 }} value={selectedMonth} onChange={e => setSelectedMonth(e.target.value)}>
          {months12.map(m => <option key={m} value={m}>{getFullMonthLabel(m)}</option>)}
        </select>
      </div>

      <table style={{ width: '100%', borderCollapse: 'collapse' }}>
        <thead>
          <tr style={{ background: 'var(--black)' }}>
            <th style={{ padding: '10px 16px', textAlign: 'left', color: '#fff', fontSize: 11, fontWeight: 600, letterSpacing: '0.08em', textTransform: 'uppercase' }}>Item</th>
            <th style={{ padding: '10px 16px', textAlign: 'right', color: '#fff', fontSize: 11, fontWeight: 600, letterSpacing: '0.08em', textTransform: 'uppercase' }}>Valor</th>
            <th style={{ padding: '10px 16px', textAlign: 'right', color: '#fff', fontSize: 11, fontWeight: 600, letterSpacing: '0.08em', textTransform: 'uppercase' }}>% Receita</th>
          </tr>
        </thead>
        <tbody>
          {rows.map((row, i) => (
            <tr key={i} style={{
              borderBottom: row.divider ? '2px solid var(--black)' : '1px solid #f0ece6',
              background: row.highlight ? (row.value >= 0 ? '#f0fff4' : '#fff8f8') : 'transparent',
            }}>
              <td style={{
                padding: '10px 16px',
                paddingLeft: row.indent ? 32 : 16,
                fontWeight: row.bold ? 700 : 400,
                fontFamily: row.bold ? 'var(--font-display)' : 'var(--font-ui)',
                fontSize: row.bold ? 14 : 13,
                color: row.muted ? 'var(--muted)' : 'var(--black)',
              }}>{row.label}</td>
              <td style={{
                padding: '10px 16px',
                textAlign: 'right',
                fontFamily: 'var(--font-mono)',
                fontWeight: row.bold ? 700 : 500,
                fontSize: row.bold ? 14 : 13,
                color: row.value >= 0 ? (row.bold ? 'var(--success)' : 'var(--black)') : 'var(--danger)',
              }}>
                {row.value < 0 ? '− ' : ''}{fmtBRL(Math.abs(row.value))}
              </td>
              <td style={{
                padding: '10px 16px',
                textAlign: 'right',
                fontFamily: 'var(--font-mono)',
                fontSize: 12,
                color: row.margin !== undefined
                  ? (row.margin >= 0 ? 'var(--success)' : 'var(--danger)')
                  : 'var(--muted)',
              }}>
                {row.margin !== undefined
                  ? (row.margin >= 0 ? '+' : '') + row.margin.toFixed(1) + '%'
                  : receitaOp > 0
                    ? (row.value/receitaOp*100).toFixed(1) + '%'
                    : '—'}
              </td>
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════
   NÍVEL 2 — CMV
═══════════════════════════════════════════════════════ */
function CMVChart({ expenses, revenue, expenseItems }) {
  const now = new Date();
  const months6 = Array.from({length:6},(_,i) => {
    const d = new Date(now.getFullYear(), now.getMonth()-5+i, 1);
    return monthISO(d);
  });

  const chartRef = useRef(null);
  const chartInst = useRef(null);

  function revForMonth(ym) {
    return revenue.filter(r => {
      const key = r.date ? r.date : (r.month + '-01');
      return key.startsWith(ym) && (!r.tipo || r.tipo === 'operacional');
    }).reduce((a,b) => a + (parseFloat(b.amount)||0), 0);
  }

  function cmvForMonth(ym) {
    return expenses.filter(e => {
      const date = e.paid_date || e.due_date;
      return date.startsWith(ym) && e.category === 'Compras';
    }).reduce((a,b) => a + (parseFloat(b.amount)||0), 0);
  }

  const data = months6.map(ym => {
    const rev = revForMonth(ym);
    const cmv = cmvForMonth(ym);
    const pct = rev > 0 ? (cmv/rev*100) : 0;
    return { ym, rev, cmv, pct };
  });

  useEffect(() => {
    if (!chartRef.current) return;
    if (chartInst.current) chartInst.current.destroy();
    chartInst.current = new Chart(chartRef.current, {
      type: 'bar',
      data: {
        labels: months6.map(getMonthLabel),
        datasets: [
          { label: 'Receita Op.', data: data.map(d => d.rev), backgroundColor: '#19903a', borderRadius: 2 },
          { label: 'CMV', data: data.map(d => d.cmv), backgroundColor: '#000', borderRadius: 2 },
        ]
      },
      options: {
        responsive: true,
        plugins: { legend: { labels: { font: { family: 'DM Sans', size: 12 } } } },
        scales: {
          y: { ticks: { callback: v => 'R$'+Math.round(v/1000)+'k', font: { family: 'JetBrains Mono', size: 10 } }, grid: { color: '#f0ece6' } },
          x: { ticks: { font: { family: 'DM Sans', size: 11 } }, grid: { display: false } }
        }
      }
    });
    return () => { if(chartInst.current) chartInst.current.destroy(); };
  }, [expenses, revenue]);

  const avgCMV = data.filter(d => d.pct > 0).reduce((a,b) => a+b.pct, 0) / (data.filter(d => d.pct > 0).length || 1);

  return (
    <div className="chart-card">
      <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', marginBottom: 16 }}>
        <div>
          <div className="chart-title">CMV — Custo de Mercadoria Vendida</div>
          <div className="chart-sub">Percentual do faturamento consumido em compras · 6 meses</div>
        </div>
        <div style={{ textAlign: 'right' }}>
          <div style={{ fontSize: 10, color: 'var(--muted)', letterSpacing: '0.1em', textTransform: 'uppercase' }}>Média CMV%</div>
          <div style={{ fontFamily: 'var(--font-mono)', fontSize: 22, fontWeight: 700, color: avgCMV > 35 ? 'var(--danger)' : 'var(--success)' }}>
            {avgCMV.toFixed(1)}%
          </div>
          <div style={{ fontSize: 10, color: 'var(--muted)' }}>Referência ideal: &lt; 35%</div>
        </div>
      </div>
      <canvas ref={chartRef} height={80} />
      <table style={{ width: '100%', marginTop: 12, borderCollapse: 'collapse', fontSize: 12 }}>
        <thead>
          <tr style={{ background: '#f5f2ed' }}>
            <th style={{ padding: '6px 10px', textAlign: 'left', fontSize: 10, fontWeight: 600, color: 'var(--muted)', letterSpacing: '0.08em', textTransform: 'uppercase' }}>Mês</th>
            <th style={{ padding: '6px 10px', textAlign: 'right', fontSize: 10, fontWeight: 600, color: 'var(--muted)', letterSpacing: '0.08em', textTransform: 'uppercase' }}>Receita Op.</th>
            <th style={{ padding: '6px 10px', textAlign: 'right', fontSize: 10, fontWeight: 600, color: 'var(--muted)', letterSpacing: '0.08em', textTransform: 'uppercase' }}>CMV</th>
            <th style={{ padding: '6px 10px', textAlign: 'right', fontSize: 10, fontWeight: 600, color: 'var(--muted)', letterSpacing: '0.08em', textTransform: 'uppercase' }}>CMV%</th>
          </tr>
        </thead>
        <tbody>
          {data.map(d => (
            <tr key={d.ym} style={{ borderBottom: '1px solid #f0ece6' }}>
              <td style={{ padding: '7px 10px', fontWeight: 500 }}>{getFullMonthLabel(d.ym)}</td>
              <td style={{ padding: '7px 10px', textAlign: 'right', fontFamily: 'var(--font-mono)' }}>{fmtBRL(d.rev)}</td>
              <td style={{ padding: '7px 10px', textAlign: 'right', fontFamily: 'var(--font-mono)' }}>{fmtBRL(d.cmv)}</td>
              <td style={{ padding: '7px 10px', textAlign: 'right', fontFamily: 'var(--font-mono)', fontWeight: 600, color: d.pct > 35 ? 'var(--danger)' : d.pct > 0 ? 'var(--success)' : 'var(--muted)' }}>
                {d.pct > 0 ? d.pct.toFixed(1) + '%' : '—'}
              </td>
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════
   NÍVEL 2 — COMPARATIVO MÊS A MÊS
═══════════════════════════════════════════════════════ */
function ComparativoMensal({ expenses, revenue }) {
  const now = new Date();

  function getMonthData(ym) {
    const rev = revenue.filter(r => {
      const key = r.date ? r.date : (r.month + '-01');
      return key.startsWith(ym);
    }).reduce((a,b) => a + (parseFloat(b.amount)||0), 0);

    const exp = expenses.filter(e => {
      const date = e.paid_date || e.due_date;
      return date.startsWith(ym);
    }).reduce((a,b) => a + (parseFloat(b.amount)||0), 0);

    const catBreakdown = {};
    expenses.filter(e => {
      const date = e.paid_date || e.due_date;
      return date.startsWith(ym);
    }).forEach(e => {
      catBreakdown[e.category] = (catBreakdown[e.category]||0) + (parseFloat(e.amount)||0);
    });

    return { rev, exp, result: rev-exp, catBreakdown };
  }

  const currentM = monthISO(now);
  const prevDate = new Date(now.getFullYear(), now.getMonth()-1, 1);
  const prevM = monthISO(prevDate);
  const prev2Date = new Date(now.getFullYear(), now.getMonth()-2, 1);
  const prev2M = monthISO(prev2Date);

  const curr = getMonthData(currentM);
  const prev = getMonthData(prevM);
  const prev2 = getMonthData(prev2M);

  function delta(curr, prev) {
    if (prev === 0) return null;
    return ((curr - prev) / prev * 100);
  }

  function DeltaBadge({ curr, prev }) {
    const d = delta(curr, prev);
    if (d === null) return <span style={{ color: 'var(--muted)', fontSize: 11 }}>—</span>;
    const positive = d >= 0;
    return (
      <span style={{
        fontFamily: 'var(--font-mono)', fontSize: 11, fontWeight: 600,
        color: positive ? 'var(--success)' : 'var(--danger)',
      }}>
        {positive ? '▲' : '▼'} {Math.abs(d).toFixed(1)}%
      </span>
    );
  }

  const allCats = [...new Set([...Object.keys(curr.catBreakdown), ...Object.keys(prev.catBreakdown)])].sort();

  return (
    <div className="chart-card">
      <div className="chart-title">Comparativo Mês a Mês</div>
      <div className="chart-sub">Variação de receita, despesas e categorias</div>

      {/* Main comparison */}
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 12, margin: '16px 0' }}>
        {[
          { label: 'Receita', curr: curr.rev, prev: prev.rev, prev2: prev2.rev },
          { label: 'Despesas', curr: curr.exp, prev: prev.exp, prev2: prev2.exp },
          { label: 'Resultado', curr: curr.result, prev: prev.result, prev2: prev2.result },
        ].map(item => (
          <div key={item.label} className="metric-card" style={{ padding: '14px 16px' }}>
            <div className="metric-label">{item.label}</div>
            <div style={{ fontFamily: 'var(--font-mono)', fontSize: 18, fontWeight: 700, color: item.label === 'Resultado' ? (item.curr >= 0 ? 'var(--success)' : 'var(--danger)') : 'var(--black)', margin: '4px 0' }}>
              {fmtBRL(Math.abs(item.curr))}
            </div>
            <div style={{ fontSize: 11, color: 'var(--muted)', marginBottom: 4 }}>vs {getMonthLabel(prevM)}: <DeltaBadge curr={item.curr} prev={item.prev} /></div>
            <div style={{ fontSize: 11, color: 'var(--muted)' }}>vs {getMonthLabel(prev2M)}: <DeltaBadge curr={item.curr} prev={item.prev2} /></div>
          </div>
        ))}
      </div>

      {/* Category breakdown */}
      {allCats.length > 0 && (
        <>
          <div style={{ fontSize: 11, fontWeight: 600, color: 'var(--muted)', letterSpacing: '0.1em', textTransform: 'uppercase', marginBottom: 8 }}>Despesas por Categoria</div>
          <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 12 }}>
            <thead>
              <tr style={{ background: '#f5f2ed' }}>
                <th style={{ padding: '6px 10px', textAlign: 'left', fontSize: 10, fontWeight: 600, color: 'var(--muted)', textTransform: 'uppercase', letterSpacing: '0.08em' }}>Categoria</th>
                <th style={{ padding: '6px 10px', textAlign: 'right', fontSize: 10, fontWeight: 600, color: 'var(--muted)', textTransform: 'uppercase', letterSpacing: '0.08em' }}>{getMonthLabel(prev2M)}</th>
                <th style={{ padding: '6px 10px', textAlign: 'right', fontSize: 10, fontWeight: 600, color: 'var(--muted)', textTransform: 'uppercase', letterSpacing: '0.08em' }}>{getMonthLabel(prevM)}</th>
                <th style={{ padding: '6px 10px', textAlign: 'right', fontSize: 10, fontWeight: 600, color: 'var(--muted)', textTransform: 'uppercase', letterSpacing: '0.08em' }}>{getMonthLabel(currentM)}</th>
                <th style={{ padding: '6px 10px', textAlign: 'right', fontSize: 10, fontWeight: 600, color: 'var(--muted)', textTransform: 'uppercase', letterSpacing: '0.08em' }}>Var. %</th>
              </tr>
            </thead>
            <tbody>
              {allCats.map(cat => {
                const c2 = prev2.catBreakdown[cat] || 0;
                const c1 = prev.catBreakdown[cat] || 0;
                const c0 = curr.catBreakdown[cat] || 0;
                const d = delta(c0, c1);
                return (
                  <tr key={cat} style={{ borderBottom: '1px solid #f0ece6' }}>
                    <td style={{ padding: '7px 10px', fontWeight: 500 }}>{cat}</td>
                    <td style={{ padding: '7px 10px', textAlign: 'right', fontFamily: 'var(--font-mono)', color: 'var(--muted)' }}>{c2 > 0 ? fmtBRL(c2) : '—'}</td>
                    <td style={{ padding: '7px 10px', textAlign: 'right', fontFamily: 'var(--font-mono)', color: 'var(--muted)' }}>{c1 > 0 ? fmtBRL(c1) : '—'}</td>
                    <td style={{ padding: '7px 10px', textAlign: 'right', fontFamily: 'var(--font-mono)', fontWeight: 600 }}>{c0 > 0 ? fmtBRL(c0) : '—'}</td>
                    <td style={{ padding: '7px 10px', textAlign: 'right' }}>
                      {d !== null ? (
                        <span style={{ fontFamily: 'var(--font-mono)', fontSize: 11, fontWeight: 600, color: d <= 0 ? 'var(--success)' : 'var(--danger)' }}>
                          {d >= 0 ? '▲' : '▼'} {Math.abs(d).toFixed(1)}%
                        </span>
                      ) : '—'}
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════════════════
   INSUMOS — Gastos por Categoria de Item
═══════════════════════════════════════════════════════ */
function InsumosCatChart({ expenseItems, expenses }) {
  const chartRef = useRef(null);
  const chartInst = useRef(null);
  const [period, setPeriod] = useState('month');
  const now = new Date();

  const filtered = expenseItems.filter(item => {
    const exp = expenses.find(e => e.id === item.expense_id);
    if (!exp) return false;
    if (period === 'month') return exp.due_date.startsWith(monthISO(now));
    if (period === 'year') return exp.due_date.startsWith(now.getFullYear().toString());
    return true;
  });

  const catTotals = {};
  filtered.forEach(item => {
    const cat = item.category || 'Outros';
    catTotals[cat] = (catTotals[cat] || 0) + (parseFloat(item.total) || 0);
  });

  const sorted = Object.entries(catTotals).sort((a,b) => b[1]-a[1]);

  useEffect(() => {
    if (!chartRef.current || sorted.length === 0) return;
    if (chartInst.current) chartInst.current.destroy();
    chartInst.current = new Chart(chartRef.current, {
      type: 'bar',
      data: {
        labels: sorted.map(([c]) => c),
        datasets: [{ data: sorted.map(([,v]) => v), backgroundColor: '#19903a', borderRadius: 2 }]
      },
      options: {
        indexAxis: 'y', responsive: true,
        plugins: { legend: { display: false } },
        scales: {
          x: { ticks: { callback: v => 'R$'+Math.round(v/1000)+'k', font: { family: 'JetBrains Mono', size: 10 } }, grid: { color: '#f0ece6' } },
          y: { ticks: { font: { family: 'DM Sans', size: 11 } }, grid: { display: false } }
        }
      }
    });
    return () => { if(chartInst.current) chartInst.current.destroy(); };
  }, [filtered.length, period]);

  const total = sorted.reduce((a,[,v]) => a+v, 0);

  return (
    <div className="chart-card">
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 4 }}>
        <div>
          <div className="chart-title">Gastos por Categoria de Insumo</div>
          <div className="chart-sub">Total: {fmtBRL(total)}</div>
        </div>
        <div style={{ display: 'flex', gap: 6 }}>
          {[['month','Mês'],['year','Ano'],['all','Tudo']].map(([v,l]) => (
            <button key={v} className={`btn btn-sm ${period===v?'btn-primary':'btn-secondary'}`} onClick={() => setPeriod(v)}>{l}</button>
          ))}
        </div>
      </div>
      {sorted.length === 0 ? (
        <div style={{ color: 'var(--muted)', fontSize: 13, padding: '20px 0' }}>Sem dados para o período selecionado.</div>
      ) : (
        <>
          <canvas ref={chartRef} height={Math.min(sorted.length * 28 + 40, 300)} />
          <table style={{ width: '100%', marginTop: 12, fontSize: 12, borderCollapse: 'collapse' }}>
            <thead>
              <tr style={{ background: '#f5f2ed' }}>
                <th style={{ padding: '6px 10px', textAlign: 'left', fontWeight: 600, color: 'var(--muted)', fontSize: 10, letterSpacing: '0.08em', textTransform: 'uppercase' }}>Categoria</th>
                <th style={{ padding: '6px 10px', textAlign: 'right', fontWeight: 600, color: 'var(--muted)', fontSize: 10, letterSpacing: '0.08em', textTransform: 'uppercase' }}>Total</th>
                <th style={{ padding: '6px 10px', textAlign: 'right', fontWeight: 600, color: 'var(--muted)', fontSize: 10, letterSpacing: '0.08em', textTransform: 'uppercase' }}>% do Total</th>
              </tr>
            </thead>
            <tbody>
              {sorted.map(([cat, val]) => (
                <tr key={cat} style={{ borderBottom: '1px solid #f0ece6' }}>
                  <td style={{ padding: '7px 10px', fontWeight: 500 }}>{cat}</td>
                  <td style={{ padding: '7px 10px', textAlign: 'right', fontFamily: 'var(--font-mono)', fontWeight: 600 }}>{fmtBRL(val)}</td>
                  <td style={{ padding: '7px 10px', textAlign: 'right', color: 'var(--muted)' }}>{total > 0 ? (val/total*100).toFixed(1) : 0}%</td>
                </tr>
              ))}
            </tbody>
          </table>
        </>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════════════════
   INSUMOS — Top Produtos por Gasto
═══════════════════════════════════════════════════════ */
function TopProdutosChart({ expenseItems, expenses }) {
  const [period, setPeriod] = useState('year');
  const [limit, setLimit] = useState(15);
  const now = new Date();

  const filtered = expenseItems.filter(item => {
    const exp = expenses.find(e => e.id === item.expense_id);
    if (!exp) return false;
    if (period === 'month') return exp.due_date.startsWith(monthISO(now));
    if (period === 'year') return exp.due_date.startsWith(now.getFullYear().toString());
    return true;
  });

  const prodTotals = {};
  const prodCats = {};
  filtered.forEach(item => {
    const key = item.description;
    prodTotals[key] = (prodTotals[key] || 0) + (parseFloat(item.total) || 0);
    prodCats[key] = item.category || 'Outros';
  });

  const sorted = Object.entries(prodTotals).sort((a,b) => b[1]-a[1]).slice(0, limit);
  const grandTotal = Object.values(prodTotals).reduce((a,b) => a+b, 0);

  return (
    <div className="chart-card">
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 12 }}>
        <div>
          <div className="chart-title">Top Produtos por Gasto</div>
          <div className="chart-sub">{sorted.length} de {Object.keys(prodTotals).length} produtos</div>
        </div>
        <div style={{ display: 'flex', gap: 6 }}>
          {[['month','Mês'],['year','Ano'],['all','Tudo']].map(([v,l]) => (
            <button key={v} className={`btn btn-sm ${period===v?'btn-primary':'btn-secondary'}`} onClick={() => setPeriod(v)}>{l}</button>
          ))}
        </div>
      </div>
      {sorted.length === 0 ? (
        <div style={{ color: 'var(--muted)', fontSize: 13 }}>Sem dados para o período.</div>
      ) : (
        <>
          {sorted.map(([name, total], i) => {
            const pct = grandTotal > 0 ? (total/grandTotal*100) : 0;
            return (
              <div key={name} style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 8 }}>
                <div style={{ width: 20, fontSize: 10, color: 'var(--muted)', textAlign: 'right', fontFamily: 'var(--font-mono)', flexShrink: 0 }}>{i+1}</div>
                <div style={{ width: 200, fontSize: 12, fontWeight: 500, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', flexShrink: 0 }} title={name}>{name}</div>
                <div style={{ fontSize: 9, color: 'var(--muted)', background: '#f0ece6', padding: '1px 6px', borderRadius: 2, flexShrink: 0 }}>{prodCats[name]}</div>
                <div style={{ flex: 1, height: 8, background: '#f0ece6', borderRadius: 2, overflow: 'hidden' }}>
                  <div style={{ width: pct+'%', height: '100%', background: 'var(--green)' }} />
                </div>
