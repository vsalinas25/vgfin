                <div style={{ fontFamily: 'var(--font-mono)', fontSize: 12, width: 90, textAlign: 'right', flexShrink: 0, fontWeight: 600 }}>{fmtBRL(total)}</div>
                <div style={{ fontSize: 11, color: 'var(--muted)', width: 40, textAlign: 'right', flexShrink: 0 }}>{pct.toFixed(1)}%</div>
              </div>
            );
          })}
          {Object.keys(prodTotals).length > limit && (
            <button className="btn btn-ghost btn-sm" style={{ marginTop: 8 }} onClick={() => setLimit(l => l+15)}>
              Ver mais {Math.min(15, Object.keys(prodTotals).length-limit)} produtos
            </button>
          )}
        </>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════════════════
   INSUMOS — Evolução de Preço por Produto
═══════════════════════════════════════════════════════ */
function PriceEvolutionChart({ expenseItems, expenses }) {
  const chartRef = useRef(null);
  const chartInst = useRef(null);
  const [selectedProduct, setSelectedProduct] = useState('');

  // Get unique product names sorted
  const allProducts = [...new Set(expenseItems.map(i => i.description))].sort();

  // Get price history for selected product
  const history = expenseItems
    .filter(i => i.description === selectedProduct && i.unit_price)
    .map(i => {
      const exp = expenses.find(e => e.id === i.expense_id);
      return { date: exp?.due_date, price: parseFloat(i.unit_price), supplier: exp?.supplier_name, qty: i.quantity, unit: i.unit };
    })
    .filter(h => h.date)
    .sort((a,b) => a.date.localeCompare(b.date));

  useEffect(() => {
    if (!chartRef.current || history.length < 2) return;
    if (chartInst.current) chartInst.current.destroy();
    chartInst.current = new Chart(chartRef.current, {
      type: 'line',
      data: {
        labels: history.map(h => fmtDate(h.date)),
        datasets: [{
          label: 'Preço unitário',
          data: history.map(h => h.price),
          borderColor: '#19903a',
          backgroundColor: 'rgba(25,144,58,0.08)',
          fill: true,
          tension: 0.3,
          pointRadius: 5,
          pointBackgroundColor: '#19903a',
        }]
      },
      options: {
        responsive: true,
        plugins: { legend: { display: false } },
        scales: {
          y: { ticks: { callback: v => 'R$'+v.toFixed(2), font: { family: 'JetBrains Mono', size: 10 } }, grid: { color: '#f0ece6' } },
          x: { ticks: { font: { family: 'DM Sans', size: 10 } }, grid: { display: false } }
        }
      }
    });
    return () => { if(chartInst.current) chartInst.current.destroy(); };
  }, [selectedProduct, history.length]);

  // Price variation
  const firstPrice = history[0]?.price;
  const lastPrice = history[history.length-1]?.price;
  const variation = firstPrice && lastPrice ? ((lastPrice - firstPrice) / firstPrice * 100) : null;

  return (
    <div className="chart-card">
      <div className="chart-title">Evolução de Preço por Produto</div>
      <div className="chart-sub">Histórico de preço unitário ao longo das compras</div>

      <div style={{ marginBottom: 16 }}>
        <select className="form-control" style={{ maxWidth: 400 }} value={selectedProduct} onChange={e => setSelectedProduct(e.target.value)}>
          <option value="">Selecione um produto...</option>
          {allProducts.map(p => <option key={p} value={p}>{p}</option>)}
        </select>
      </div>

      {!selectedProduct ? (
        <div style={{ color: 'var(--muted)', fontSize: 13 }}>Selecione um produto para ver a evolução de preço.</div>
      ) : history.length === 0 ? (
        <div style={{ color: 'var(--muted)', fontSize: 13 }}>Nenhum histórico de preço para este produto.</div>
      ) : (
        <>
          {variation !== null && (
            <div style={{ display: 'flex', gap: 16, marginBottom: 16, flexWrap: 'wrap' }}>
              <div className="metric-card" style={{ padding: '12px 16px', flex: 1 }}>
                <div className="metric-label">Primeiro Preço</div>
                <div className="metric-value" style={{ fontSize: 16 }}>{fmtBRL(firstPrice)}</div>
                <div className="metric-sub">{fmtDate(history[0].date)}</div>
              </div>
              <div className="metric-card" style={{ padding: '12px 16px', flex: 1 }}>
                <div className="metric-label">Último Preço</div>
                <div className="metric-value" style={{ fontSize: 16 }}>{fmtBRL(lastPrice)}</div>
                <div className="metric-sub">{fmtDate(history[history.length-1].date)}</div>
              </div>
              <div className="metric-card" style={{ padding: '12px 16px', flex: 1 }}>
                <div className="metric-label">Variação Total</div>
                <div className={`metric-value ${variation >= 0 ? 'negative' : 'positive'}`} style={{ fontSize: 16 }}>
                  {variation >= 0 ? '+' : ''}{variation.toFixed(1)}%
                </div>
                <div className="metric-sub">{history.length} compra{history.length > 1 ? 's' : ''}</div>
              </div>
            </div>
          )}
          {history.length >= 2 ? (
            <canvas ref={chartRef} height={80} />
          ) : (
            <div style={{ color: 'var(--muted)', fontSize: 13 }}>Apenas 1 registro — são necessários 2+ para mostrar evolução.</div>
          )}
          <table style={{ width: '100%', marginTop: 12, fontSize: 12, borderCollapse: 'collapse' }}>
            <thead>
              <tr style={{ background: '#f5f2ed' }}>
                <th style={{ padding: '6px 10px', textAlign: 'left', fontWeight: 600, color: 'var(--muted)', fontSize: 10, letterSpacing: '0.08em', textTransform: 'uppercase' }}>Data</th>
                <th style={{ padding: '6px 10px', textAlign: 'left', fontWeight: 600, color: 'var(--muted)', fontSize: 10, letterSpacing: '0.08em', textTransform: 'uppercase' }}>Fornecedor</th>
                <th style={{ padding: '6px 10px', textAlign: 'right', fontWeight: 600, color: 'var(--muted)', fontSize: 10, letterSpacing: '0.08em', textTransform: 'uppercase' }}>Qtd</th>
                <th style={{ padding: '6px 10px', textAlign: 'right', fontWeight: 600, color: 'var(--muted)', fontSize: 10, letterSpacing: '0.08em', textTransform: 'uppercase' }}>V. Unit</th>
                <th style={{ padding: '6px 10px', textAlign: 'right', fontWeight: 600, color: 'var(--muted)', fontSize: 10, letterSpacing: '0.08em', textTransform: 'uppercase' }}>Total</th>
              </tr>
            </thead>
            <tbody>
              {history.map((h, i) => (
                <tr key={i} style={{ borderBottom: '1px solid #f0ece6' }}>
                  <td style={{ padding: '7px 10px' }}>{fmtDate(h.date)}</td>
                  <td style={{ padding: '7px 10px', color: 'var(--muted)', fontSize: 11 }}>{h.supplier}</td>
                  <td style={{ padding: '7px 10px', textAlign: 'right', fontFamily: 'var(--font-mono)' }}>{h.qty} {h.unit}</td>
                  <td style={{ padding: '7px 10px', textAlign: 'right', fontFamily: 'var(--font-mono)', fontWeight: 600 }}>{fmtBRL(h.price)}</td>
                  <td style={{ padding: '7px 10px', textAlign: 'right', fontFamily: 'var(--font-mono)' }}>{fmtBRL(h.price * h.qty)}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════════════════
   MODULE 5 — RELATÓRIOS
═══════════════════════════════════════════════════════ */
function Relatorios({ expenses, revenue, expenseItems }) {
  const catChartRef = useRef(null);
  const revExpChartRef = useRef(null);
  const resultChartRef = useRef(null);
  const balanceChartRef = useRef(null);
  const itemCatChartRef = useRef(null);
  const priceEvolutionChartRef = useRef(null);
  const charts = useRef({});
  const [selectedProduct, setSelectedProduct] = useState('');
  const [itemPeriod, setItemPeriod] = useState('all'); // all | year | month

  useEffect(() => {
    buildCharts();
    return () => Object.values(charts.current).forEach(c => c?.destroy());
  }, [expenses, revenue]);

  function buildCharts() {
    Object.values(charts.current).forEach(c => c?.destroy());
    const now = new Date();
    const currentMonth = monthISO(now);

    // 1. Despesas por Categoria
    if (catChartRef.current) {
      const catTotals = {};
      expenses.filter(e => e.due_date.startsWith(currentMonth)).forEach(e => {
        catTotals[e.category] = (catTotals[e.category]||0) + e.amount;
      });
      charts.current.cat = new Chart(catChartRef.current, {
        type: 'bar',
        data: {
          labels: Object.keys(catTotals),
          datasets: [{ data: Object.values(catTotals), backgroundColor: '#19903a', borderRadius: 2 }]
        },
        options: {
          indexAxis: 'y', responsive: true,
          plugins: { legend: { display: false } },
          scales: {
            x: { ticks: { callback: v => 'R$'+Math.round(v/1000)+'k', font: { family: 'JetBrains Mono', size: 10 } }, grid: { color: '#f0ece6' } },
            y: { ticks: { font: { family: 'DM Sans', size: 11 } }, grid: { display: false } }
          }
        }
      });
    }

    // 2. Receita vs Despesas 12 meses
    const months12 = Array.from({length:12},(_,i) => {
      const d = new Date(now.getFullYear(), now.getMonth()-11+i, 1);
      return monthISO(d);
    });
    if (revExpChartRef.current) {
      charts.current.revexp = new Chart(revExpChartRef.current, {
        type: 'bar',
        data: {
          labels: months12.map(getMonthLabel),
          datasets: [
            { label: 'Receita', data: months12.map(m => revenue.filter(r=>r.month===m).reduce((a,b)=>a+b.amount,0)), backgroundColor: '#19903a', borderRadius: 2 },
            { label: 'Despesas', data: months12.map(m => expenses.filter(e=>e.due_date.startsWith(m)).reduce((a,b)=>a+b.amount,0)), backgroundColor: '#000', borderRadius: 2 },
          ]
        },
        options: { responsive: true, plugins: { legend: { labels: { font: { family: 'DM Sans', size: 12 } } } }, scales: { y: { ticks: { callback: v=>'R$'+Math.round(v/1000)+'k', font: { family: 'JetBrains Mono', size: 11 } }, grid: { color: '#f0ece6' } }, x: { ticks: { font: { family: 'DM Sans', size: 11 } }, grid: { display: false } } } }
      });
    }

    // 3. Resultado Mensal line
    if (resultChartRef.current) {
      const results = months12.map(m => {
        const rev = revenue.filter(r=>r.month===m).reduce((a,b)=>a+b.amount,0);
        const exp = expenses.filter(e=>e.due_date.startsWith(m)).reduce((a,b)=>a+b.amount,0);
        return rev - exp;
      });
      charts.current.result = new Chart(resultChartRef.current, {
        type: 'line',
        data: {
          labels: months12.map(getMonthLabel),
          datasets: [{
            label: 'Resultado',
            data: results,
            borderColor: '#19903a',
            backgroundColor: 'rgba(25,144,58,0.08)',
            fill: true,
            tension: 0.3,
            pointBackgroundColor: results.map(v => v >= 0 ? '#19903a' : '#c0392b'),
            pointRadius: 5,
          }]
        },
        options: {
          responsive: true,
          plugins: { legend: { display: false } },
          scales: {
            y: { ticks: { callback: v=>'R$'+Math.round(v/1000)+'k', font: { family: 'JetBrains Mono', size: 11 } }, grid: { color: '#f0ece6' } },
            x: { ticks: { font: { family: 'DM Sans', size: 11 } }, grid: { display: false } }
          }
        }
      });
    }

    // 4. Balance evolution
    if (balanceChartRef.current) {
      let cum = 0;
      const balances = months12.map(m => {
        const rev = revenue.filter(r=>r.month===m).reduce((a,b)=>a+b.amount,0);
        const exp = expenses.filter(e=>e.due_date.startsWith(m)).reduce((a,b)=>a+b.amount,0);
        cum += rev - exp;
        return cum;
      });
      charts.current.balance = new Chart(balanceChartRef.current, {
        type: 'line',
        data: {
          labels: months12.map(getMonthLabel),
          datasets: [{
            label: 'Saldo em Caixa',
            data: balances,
            borderColor: '#19903a',
            backgroundColor: 'rgba(25,144,58,0.1)',
            fill: true,
            tension: 0.3,
          }]
        },
        options: {
          responsive: true,
          plugins: { legend: { display: false } },
          scales: {
            y: { ticks: { callback: v=>'R$'+Math.round(v/1000)+'k', font: { family: 'JetBrains Mono', size: 11 } }, grid: { color: '#f0ece6' } },
            x: { ticks: { font: { family: 'DM Sans', size: 11 } }, grid: { display: false } }
          }
        }
      });
    }
  }

  // 5. Top suppliers
  const supplierTotals = {};
  expenses.filter(e => e.due_date.startsWith(new Date().getFullYear().toString())).forEach(e => {
    supplierTotals[e.supplier_name] = (supplierTotals[e.supplier_name]||0) + e.amount;
  });
  const topSuppliers = Object.entries(supplierTotals).sort((a,b)=>b[1]-a[1]).slice(0,10);
  const topTotal = topSuppliers.reduce((a,b)=>a+b[1],0);

  return (
    <div className="page">
      <div className="page-header">
        <div className="page-title">Relatórios</div>
        <div className="page-subtitle">Análise financeira · {new Date().getFullYear()}</div>
      </div>

      <div className="chart-card">
        <div className="chart-title">Despesas por Categoria</div>
        <div className="chart-sub">Mês atual</div>
        <canvas ref={catChartRef} height={120} />
      </div>

      <div className="chart-card">
        <div className="chart-title">Receita vs. Despesas</div>
        <div className="chart-sub">Últimos 12 meses</div>
        <canvas ref={revExpChartRef} height={80} />
      </div>

      <div className="chart-card">
        <div className="chart-title">Resultado Mensal</div>
        <div className="chart-sub">Receita − Despesas · 12 meses</div>
        <canvas ref={resultChartRef} height={80} />
      </div>

      <div className="chart-card">
        <div className="chart-title">Top Fornecedores por Gasto — YTD</div>
        <div className="chart-sub">{new Date().getFullYear()}</div>
        {topSuppliers.length === 0 ? <div style={{ color: 'var(--muted)', fontSize: 13 }}>Sem dados.</div> : (
          <div>
            {topSuppliers.map(([name, total]) => {
              const pct = topTotal > 0 ? (total/topTotal*100).toFixed(1) : 0;
              return (
                <div key={name} style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 10 }}>
                  <div style={{ width: 140, fontSize: 13, fontWeight: 500, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{name}</div>
                  <div style={{ flex: 1, height: 8, background: '#f0ece6', borderRadius: 2, overflow: 'hidden' }}>
                    <div style={{ width: pct+'%', height: '100%', background: 'var(--green)' }} />
                  </div>
                  <div className="mono" style={{ fontSize: 12, width: 90, textAlign: 'right' }}>{fmtBRL(total)}</div>
                  <div style={{ fontSize: 11, color: 'var(--muted)', width: 40, textAlign: 'right' }}>{pct}%</div>
                </div>
              );
            })}
          </div>
        )}
      </div>

      <div className="chart-card">
        <div className="chart-title">Evolução do Saldo em Caixa</div>
        <div className="chart-sub">Últimos 12 meses</div>
        <canvas ref={balanceChartRef} height={80} />
      </div>

      {/* ── DRE ─────────────────────────────────────────── */}
      <div style={{ marginTop: 8, marginBottom: 8 }}>
        <div style={{ fontFamily: 'var(--font-display)', fontSize: 20, fontWeight: 900, marginBottom: 4 }}>Resultado Econômico</div>
        <div style={{ fontSize: 12, color: 'var(--muted)', marginBottom: 16 }}>DRE, CMV e comparativo mensal</div>
      </div>

      <DREMensal expenses={expenses} revenue={revenue} expenseItems={expenseItems} />
      <CMVChart expenses={expenses} revenue={revenue} expenseItems={expenseItems} />
      <ComparativoMensal expenses={expenses} revenue={revenue} />

      {/* ── ANÁLISE DE INSUMOS ─────────────────────────── */}
      <div style={{ marginTop: 8, marginBottom: 8 }}>
        <div style={{ fontFamily: 'var(--font-display)', fontSize: 20, fontWeight: 900, marginBottom: 4 }}>Análise de Insumos</div>
        <div style={{ fontSize: 12, color: 'var(--muted)', marginBottom: 16 }}>Baseado nos itens das Notas Fiscais importadas</div>
      </div>

      {expenseItems.length === 0 ? (
        <div className="chart-card">
          <div className="empty-state">
            <div className="empty-amount">R$ 0,00</div>
            <div className="empty-msg">Nenhum item de NF registrado ainda.<br/>Importe uma Nota Fiscal ao criar uma despesa.</div>
          </div>
        </div>
      ) : (
        <>
          {/* Gastos por Categoria de Item */}
          <InsumosCatChart expenseItems={expenseItems} expenses={expenses} />

          {/* Top Produtos */}
          <TopProdutosChart expenseItems={expenseItems} expenses={expenses} />

          {/* Evolução de Preço por Produto */}
          <PriceEvolutionChart expenseItems={expenseItems} expenses={expenses} />
        </>
      )}

    </div>
  );
}




/* ═══════════════════════════════════════════════════════
   IMPORTADOR DE PLANILHA
═══════════════════════════════════════════════════════ */
function ImportadorPlanilha({ onRefresh }) {
  const [rows, setRows] = useState([]);
  const [loading, setLoading] = useState(false);
  const [importing, setImporting] = useState(false);
  const [result, setResult] = useState(null);
  const [error, setError] = useState('');
  const fileRef = useRef(null);

  // Convert Excel serial date to ISO string
  function excelDateToISO(serial) {
    if (!serial || isNaN(serial)) return null;
    const num = parseFloat(serial);
    if (num < 1000) return null; // not a date
    const date = new Date((num - 25569) * 86400 * 1000);
    return date.toISOString().split('T')[0];
  }

  // Map Grupo/Subgrupo to system category
  function mapCategory(grupo, subgrupo) {
    const g = (grupo || '').toLowerCase();
    const s = (subgrupo || '').toLowerCase();
    if (s.includes('salário') || s.includes('salario')) return 'Salários';
    if (s.includes('imposto') || s.includes('das') || s.includes('tributo')) return 'Impostos';
    if (g.includes('fixo') || s.includes('aluguel') || s.includes('energia') || 
        s.includes('água') || s.includes('telefon') || s.includes('segur') ||
        s.includes('contabilidade') || s.includes('taxa')) return 'Gastos Fixos';
    if (g.includes('variável') || g.includes('variavel')) return 'Compras';
    if (g.includes('não operacional') || g.includes('nao operacional')) return 'Gastos Gerais';
    return 'Gastos Gerais';
  }

  // Map tipo receita
  function mapTipoReceita(grupo) {
    const g = (grupo || '').toLowerCase();
    if (g.includes('não operacional') || g.includes('nao operacional')) return 'nao_operacional';
    return 'operacional';
  }

  function handleFile(file) {
    if (!file) return;
    setLoading(true);
    setError('');
    setResult(null);
    setRows([]);

    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const wb = XLSX.read(e.target.result, { type: 'binary' });
        
        // Find Lancamentos sheet
        const sheetName = wb.SheetNames.find(n => n.toLowerCase().includes('lancamento')) || wb.SheetNames[0];
        const ws = wb.Sheets[sheetName];
        const data = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });

        // Find header row
        let headerIdx = -1;
        for (let i = 0; i < Math.min(data.length, 20); i++) {
          const row = data[i];
          if (row.some(cell => String(cell).toLowerCase().includes('cliente') || String(cell).toLowerCase() === 'data')) {
            headerIdx = i;
            break;
          }
        }

        if (headerIdx === -1) {
          setError('Não encontrei o cabeçalho da planilha. Verifique se a aba "Lancamentos" existe.');
          setLoading(false);
          return;
        }

        const headers = data[headerIdx].map(h => String(h).trim().toLowerCase());
        const dataIdx = headers.findIndex(h => h === 'data' || h.includes('data'));
        const clienteIdx = headers.findIndex(h => h.includes('cliente') || h.includes('fornecedor'));
        const valorIdx = headers.findIndex(h => h === 'valor');
        const tipoIdx = headers.findIndex(h => h === 'tipo');
        const grupoIdx = headers.findIndex(h => h === 'grupo');
        const subgrupoIdx = headers.findIndex(h => h === 'subgrupo');
        const statusIdx = headers.findIndex(h => h === 'status');

        const parsed = [];
        for (let i = headerIdx + 1; i < data.length; i++) {
          const row = data[i];
          if (!row || row.every(c => c === '' || c === null || c === undefined)) continue;

          const dateRaw = row[dataIdx];
          const date = excelDateToISO(dateRaw);
          if (!date) continue;

          const cliente = String(row[clienteIdx] || '').trim();
          const valor = parseFloat(row[valorIdx]) || 0;
          const tipo = String(row[tipoIdx] || '').trim();
          const grupo = String(row[grupoIdx] || '').trim();
          const subgrupo = String(row[subgrupoIdx] || '').trim();
          const status = String(row[statusIdx] || '').trim();

          if (!cliente || valor <= 0) continue;
          if (status.toLowerCase() !== 'realizado' && status !== '') {
            // skip non-realized if status column exists and is not realizado
          }

          parsed.push({ date, cliente, valor, tipo, grupo, subgrupo, isEntrada: tipo === 'Entradas' });
        }

        setRows(parsed);
        setLoading(false);
      } catch (err) {
        setError('Erro ao ler o arquivo: ' + err.message);
        setLoading(false);
      }
    };
    reader.readAsBinaryString(file);
  }

  async function handleImport() {
    if (rows.length === 0) return;
    setImporting(true);
    setError('');

    const user = (await sb.auth.getUser()).data.user;
    let revCount = 0, expCount = 0, errCount = 0;

    const entradas = rows.filter(r => r.isEntrada);
    const saidas = rows.filter(r => !r.isEntrada);

    // Insert revenue in batches of 50
    for (let i = 0; i < entradas.length; i += 50) {
      const batch = entradas.slice(i, i + 50).map(r => ({
        date: r.date,
        month: r.date.slice(0, 7),
        amount: r.valor,
        tipo: mapTipoReceita(r.grupo),
        cliente: r.cliente,
        notes: r.subgrupo || null,
        created_by: user.id,
      }));
      const { error } = await sb.from('revenue').insert(batch);
      if (error) errCount += batch.length;
      else revCount += batch.length;
    }

    // Insert expenses in batches of 50
    for (let i = 0; i < saidas.length; i += 50) {
      const batch = saidas.slice(i, i + 50).map(r => ({
        supplier_name: r.cliente,
        category: mapCategory(r.grupo, r.subgrupo),
        expense_type: r.subgrupo || null,
        amount: r.valor,
        due_date: r.date,
        paid_date: r.date,
        status: 'pago',
        created_by: user.id,
      }));
      const { error } = await sb.from('expenses').insert(batch);
      if (error) errCount += batch.length;
      else expCount += batch.length;
    }

    setResult({ revCount, expCount, errCount, total: rows.length });
    setImporting(false);
    setRows([]);
    onRefresh();
  }

  const entradas = rows.filter(r => r.isEntrada);
  const saidas = rows.filter(r => !r.isEntrada);
  const totalEntradas = entradas.reduce((a, b) => a + b.valor, 0);
  const totalSaidas = saidas.reduce((a, b) => a + b.valor, 0);

  return (
    <div className="settings-section">
      <div className="settings-section-header">Importar Planilha de Lançamentos</div>
      <div className="settings-section-body">
        <div style={{ fontSize: 13, color: 'var(--muted)', marginBottom: 16 }}>
          Importe sua planilha de fluxo de caixa. Entradas viram receitas, saídas viram despesas pagas.
          Funciona com o formato da planilha Jaque Bennert e formatos similares com aba "Lancamentos".
        </div>

        {result && (
          <div style={{ background: '#f0fff4', border: '1px solid var(--green)', borderRadius: 'var(--radius)', padding: '14px 16px', marginBottom: 16 }}>
            <div style={{ fontWeight: 700, color: 'var(--success)', marginBottom: 6 }}>✓ Importação concluída!</div>
            <div style={{ fontSize: 13 }}>
              <div>Receitas importadas: <strong>{result.revCount}</strong></div>
              <div>Despesas importadas: <strong>{result.expCount}</strong></div>
              {result.errCount > 0 && <div style={{ color: 'var(--danger)' }}>Erros: {result.errCount}</div>}
            </div>
          </div>
        )}

        {error && (
          <div style={{ background: '#fff0f0', border: '1px solid var(--danger)', borderRadius: 'var(--radius)', padding: '12px 16px', marginBottom: 16, fontSize: 13, color: 'var(--danger)' }}>
            {error}
          </div>
        )}

        {rows.length === 0 ? (
          <div
            className="nf-upload-zone"
            onClick={() => fileRef.current?.click()}
            onDragOver={e => { e.preventDefault(); e.currentTarget.classList.add('drag'); }}
            onDragLeave={e => e.currentTarget.classList.remove('drag')}
            onDrop={e => { e.preventDefault(); e.currentTarget.classList.remove('drag'); handleFile(e.dataTransfer.files[0]); }}
          >
            <input ref={fileRef} type="file" accept=".xlsx,.xls" style={{ display: 'none' }} onChange={e => handleFile(e.target.files[0])} />
            <div style={{ fontSize: 28 }}>📊</div>
            <div style={{ fontSize: 13, fontWeight: 600, marginTop: 6 }}>Arraste o arquivo XLSX ou clique para selecionar</div>
            <span className="nf-upload-label">Compatível com planilha Jaque Bennert e formatos similares</span>
            {loading && <div style={{ marginTop: 8, fontSize: 12, color: 'var(--muted)' }}>Lendo arquivo...</div>}
          </div>
        ) : (
          <>
            {/* Preview */}
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr 1fr', gap: 12, marginBottom: 16 }}>
              <div className="metric-card" style={{ padding: '12px 16px' }}>
                <div className="metric-label">Total de Lançamentos</div>
                <div className="metric-value" style={{ fontSize: 20 }}>{rows.length}</div>
              </div>
              <div className="metric-card" style={{ padding: '12px 16px' }}>
                <div className="metric-label">Entradas (Receitas)</div>
                <div className="metric-value green" style={{ fontSize: 16 }}>{fmtBRL(totalEntradas)}</div>
                <div className="metric-sub">{entradas.length} lançamentos</div>
              </div>
              <div className="metric-card" style={{ padding: '12px 16px' }}>
                <div className="metric-label">Saídas (Despesas)</div>
                <div className="metric-value" style={{ fontSize: 16 }}>{fmtBRL(totalSaidas)}</div>
                <div className="metric-sub">{saidas.length} lançamentos</div>
              </div>
              <div className="metric-card" style={{ padding: '12px 16px' }}>
                <div className="metric-label">Resultado</div>
                <div className={`metric-value ${totalEntradas - totalSaidas >= 0 ? 'positive' : 'negative'}`} style={{ fontSize: 16 }}>
                  {fmtBRLSigned(totalEntradas - totalSaidas)}
                </div>
              </div>
            </div>

            {/* Sample preview */}
            <div style={{ fontSize: 11, fontWeight: 600, color: 'var(--muted)', letterSpacing: '0.1em', textTransform: 'uppercase', marginBottom: 8 }}>
              Preview — primeiros 10 lançamentos
            </div>
            <div className="table-wrap" style={{ marginBottom: 16 }}>
              <table>
                <thead>
                  <tr>
                    <th>Data</th>
                    <th>Cliente/Fornecedor</th>
                    <th>Tipo</th>
                    <th>Valor</th>
                    <th>Categoria (sistema)</th>
                  </tr>
                </thead>
                <tbody>
                  {rows.slice(0, 10).map((r, i) => (
                    <tr key={i}>
                      <td style={{ fontSize: 12 }}>{fmtDate(r.date)}</td>
                      <td style={{ fontWeight: 500 }}>{r.cliente}</td>
                      <td>
                        <span className="badge" style={{
                          background: r.isEntrada ? '#e8f5e9' : '#fff0f0',
                          color: r.isEntrada ? '#1b5e20' : 'var(--danger)'
                        }}>
                          {r.isEntrada ? 'Receita' : 'Despesa'}
                        </span>
                      </td>
                      <td className="mono" style={{ fontWeight: 600, color: r.isEntrada ? 'var(--success)' : 'inherit' }}>
                        {fmtBRL(r.valor)}
                      </td>
                      <td style={{ fontSize: 11, color: 'var(--muted)' }}>
                        {r.isEntrada ? mapTipoReceita(r.grupo) : mapCategory(r.grupo, r.subgrupo)}
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>

            <div style={{ display: 'flex', gap: 10 }}>
              <button className="btn btn-secondary" onClick={() => { setRows([]); setError(''); }}>
                ✕ Cancelar
              </button>
              <button className="btn btn-primary" onClick={handleImport} disabled={importing}>
                {importing ? `Importando... aguarde` : `✓ Importar ${rows.length} lançamentos`}
              </button>
            </div>
          </>
        )}
      </div>
    </div>
  );

  function mapCategory(grupo, subgrupo) {
    const g = (grupo || '').toLowerCase();
    const s = (subgrupo || '').toLowerCase();
    if (s.includes('salário') || s.includes('salario')) return 'Salários';
    if (s.includes('imposto') || s.includes('das') || s.includes('tributo')) return 'Impostos';
    if (g.includes('fixo') || s.includes('aluguel') || s.includes('energia') ||
        s.includes('água') || s.includes('telefon') || s.includes('segur') ||
        s.includes('contabilidade') || s.includes('taxa')) return 'Gastos Fixos';
    if (g.includes('variável') || g.includes('variavel')) return 'Compras';
    return 'Gastos Gerais';
  }

  function mapTipoReceita(grupo) {
    const g = (grupo || '').toLowerCase();
    if (g.includes('não operacional') || g.includes('nao operacional')) return 'nao_operacional';
    return 'operacional';
  }
}


/* ═══════════════════════════════════════════════════════
   USUARIOS CONFIG
═══════════════════════════════════════════════════════ */
function UsuariosConfig({ user }) {
  const [users, setUsers] = useState([]);
  const [inviteEmail, setInviteEmail] = useState('');
  const [inviteName, setInviteName] = useState('');
  const [inviteRole, setInviteRole] = useState('staff');
  const [inviting, setInviting] = useState(false);
  const [loading, setLoading] = useState(true);
  const [createdUser, setCreatedUser] = useState(null); // { name, email, password }
  const [managingUser, setManagingUser] = useState(null); // user being managed
  const [newPassword, setNewPassword] = useState('');
  const [savingPassword, setSavingPassword] = useState(false);
  const [confirmDelete, setConfirmDelete] = useState(null); // uid to delete

  useEffect(() => {
    sb.from('profiles').select('*').then(({ data }) => {
      if (data) setUsers(data);
      setLoading(false);
    });
  }, []);

  async function changeRole(uid, role) {
    await sb.from('profiles').update({ role }).eq('id', uid);
    setUsers(prev => prev.map(u => u.id === uid ? { ...u, role } : u));
    if (managingUser?.id === uid) setManagingUser(prev => ({ ...prev, role }));
    toast('Papel atualizado!', 'success');
  }

  async function handleInvite() {
    if (!inviteEmail || !inviteName) { toast('Preencha e-mail e nome.', 'error'); return; }
    setInviting(true);

    const tempPassword = Math.random().toString(36).slice(-8) + 'A1!';

    try {
      const res = await fetch('https://dawn-cell-9729.vittoegiulio.workers.dev', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-Action': 'create-user' },
        body: JSON.stringify({ email: inviteEmail, password: tempPassword, name: inviteName }),
      });

      const result = await res.json();

      // result.id existe = usuário criado (mesmo que status seja 4xx em alguns casos)
      const userId = result?.id || result?.user?.id;

      if (!userId) {
        toast('Erro: ' + (result?.message || result?.msg || 'Falha ao criar usuário'), 'error');
        setInviting(false);
        return;
      }

      // upsert para não falhar se perfil já existir
      await sb.from('profiles').upsert({ id: userId, name: inviteName, role: inviteRole }, { onConflict: 'id' });

      setUsers(prev => {
        if (prev.find(u => u.id === userId)) return prev;
        return [...prev, { id: userId, name: inviteName, role: inviteRole, email: inviteEmail }];
      });

      setCreatedUser({ name: inviteName, email: inviteEmail, password: tempPassword });
      setInviteEmail('');
      setInviteName('');
    } catch (err) {
      toast('Erro: ' + err.message, 'error');
    }

    setInviting(false);
  }

  async function handleChangePassword() {
    if (!newPassword || newPassword.length < 6) { toast('Mínimo 6 caracteres.', 'error'); return; }
    setSavingPassword(true);
    try {
      const res = await fetch('https://dawn-cell-9729.vittoegiulio.workers.dev', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-Action': 'update-password' },
        body: JSON.stringify({ user_id: managingUser.id, password: newPassword }),
      });
      const result = await res.json();
      if (!res.ok || result.error) { toast('Erro ao alterar senha.', 'error'); }
      else { toast('Senha alterada com sucesso!', 'success'); setNewPassword(''); }
    } catch (err) { toast('Erro: ' + err.message, 'error'); }
    setSavingPassword(false);
  }

  async function handleDeleteUser(uid) {
    try {
      const res = await fetch('https://dawn-cell-9729.vittoegiulio.workers.dev', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-Action': 'delete-user' },
        body: JSON.stringify({ user_id: uid }),
      });
      const result = await res.json();
      if (!res.ok || result.error) { toast('Erro ao eliminar usuário.', 'error'); return; }
      await sb.from('profiles').delete().eq('id', uid);
      setUsers(prev => prev.filter(u => u.id !== uid));
      setConfirmDelete(null);
      if (managingUser?.id === uid) setManagingUser(null);
      toast('Usuário eliminado.', 'success');
    } catch (err) { toast('Erro: ' + err.message, 'error'); }
  }

  return (
    <div className="settings-section">
      <div className="settings-section-header">Usuários</div>
      <div className="settings-section-body">

        {/* Modal senha criada */}
        {createdUser && (

/* ═══════════════════════════════════════════════════════
   NOTIFICAÇÕES — Vencimentos por e-mail
═══════════════════════════════════════════════════════ */
function NotificacoesConfig({ expenses }) {
  const [email, setEmail] = useState(() => localStorage.getItem('vg_notif_email') || '');
  const [days, setDays] = useState(() => localStorage.getItem('vg_notif_days') || '3');
  const [saved, setSaved] = useState(false);
  const [testing, setTesting] = useState(false);

  function handleSave() {
    localStorage.setItem('vg_notif_email', email);
    localStorage.setItem('vg_notif_days', days);
    setSaved(true);
    setTimeout(() => setSaved(false), 2000);
    toast('Configurações de notificação salvas!', 'success');
  }

  // Check upcoming due expenses and show in-app alert
  const daysNum = parseInt(days) || 3;
  const targetDate = new Date();
  targetDate.setDate(targetDate.getDate() + daysNum);
  const targetISO = targetDate.toISOString().split('T')[0];

  const upcoming = expenses.filter(e =>
    e.status === 'pendente' &&
    e.due_date >= todayISO() &&
    e.due_date <= targetISO
  );

  return (
    <div className="settings-section">
      <div className="settings-section-header">Notificações de Vencimento</div>
      <div className="settings-section-body">
        <div style={{ fontSize: 13, color: 'var(--muted)', marginBottom: 14 }}>
          Configure alertas de vencimento. As notificações por e-mail requerem configuração de uma Edge Function no Supabase (guia disponível na documentação).
        </div>

        {upcoming.length > 0 && (
          <div style={{ background:'#fff3e0',border:'1px solid var(--warning)',borderRadius:'var(--radius)',padding:'12px 16px',marginBottom:16 }}>
            <div style={{ fontWeight:600,fontSize:13,marginBottom:6 }}>⚠ {upcoming.length} conta{upcoming.length>1?'s':''} vencendo nos próximos {daysNum} dias:</div>
            {upcoming.map(e => (
              <div key={e.id} style={{ fontSize:12,color:'var(--muted)',marginBottom:2 }}>
                · {e.supplier_name} — {fmtBRL(e.amount)} — vence {fmtDate(e.due_date)}
              </div>
            ))}
          </div>
        )}

        <div className="form-grid" style={{ maxWidth: 480 }}>
          <div className="form-group full">
            <label className="form-label">E-mail para notificações</label>
            <input className="form-control" type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="seu@email.com" />
          </div>
          <div className="form-group">
            <label className="form-label">Avisar com antecedência</label>
            <select className="form-control" value={days} onChange={e=>setDays(e.target.value)}>
              <option value="1">1 dia</option>
              <option value="2">2 dias</option>
              <option value="3">3 dias</option>
              <option value="5">5 dias</option>
              <option value="7">7 dias</option>
            </select>
          </div>
          <div className="form-group" style={{ display:'flex',alignItems:'flex-end' }}>
            <button className="btn btn-primary" onClick={handleSave}>{saved?'✓ Salvo':'Salvar'}</button>
          </div>
        </div>
        <div style={{ marginTop:12,fontSize:11,color:'var(--muted)' }}>
          💡 Os alertas aparecem no Dashboard automaticamente. Para envio por e-mail automático, configure a Edge Function "notify-due-expenses" no Supabase.
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════
   CATEGORIAS CONFIG
═══════════════════════════════════════════════════════ */
function CategoriasConfig() {
  const TYPES = [
    { key: 'expense', label: 'Categorias de Despesa' },
    { key: 'supplier', label: 'Categorias de Fornecedor' },
  ];
  const [categories, setCategories] = useState({ expense: [], supplier: [] });
  const [loading, setLoading] = useState(true);
  const [newName, setNewName] = useState({ expense: '', supplier: '' });
  const [adding, setAdding] = useState({ expense: false, supplier: false });
  const [confirmDelete, setConfirmDelete] = useState(null); // { id, name }

  useEffect(() => {
    sb.from('categories').select('*').order('name').then(({ data }) => {
      if (data) {
        const grouped = { expense: [], supplier: [] };
        data.forEach(c => { if (grouped[c.type]) grouped[c.type].push(c); });
        setCategories(grouped);
      }
      setLoading(false);
    });
  }, []);

  async function handleAdd(type) {
    const name = newName[type].trim();
    if (!name) { toast('Digite o nome da categoria.', 'error'); return; }
    setAdding(p => ({ ...p, [type]: true }));
    const { data, error } = await sb.from('categories').insert({ type, name }).select().single();
    if (error) { toast('Erro: ' + (error.message || 'Categoria já existe.'), 'error'); }
    else {
      setCategories(p => ({ ...p, [type]: [...p[type], data].sort((a,b) => a.name.localeCompare(b.name)) }));
      setNewName(p => ({ ...p, [type]: '' }));
      toast('Categoria adicionada!', 'success');
    }
    setAdding(p => ({ ...p, [type]: false }));
  }

  async function handleDelete(cat) {
    const { error } = await sb.from('categories').delete().eq('id', cat.id);
    if (error) { toast('Erro ao eliminar.', 'error'); return; }
    setCategories(p => ({ ...p, [cat.type]: p[cat.type].filter(c => c.id !== cat.id) }));
    setConfirmDelete(null);
    toast('Categoria eliminada.', 'success');
  }

  return (
    <div className="settings-section">
      <div className="settings-section-header">Categorias</div>
      <div className="settings-section-body">

        {confirmDelete && (
          <div className="modal-overlay" onClick={() => setConfirmDelete(null)}>
            <div className="confirm-dialog" onClick={e => e.stopPropagation()}>
              <div className="confirm-title">Eliminar categoria?</div>
              <div className="confirm-msg">"{confirmDelete.name}" será removida. Despesas existentes com essa categoria não serão afetadas.</div>
              <div style={{ display: 'flex', gap: 10 }}>
                <button className="btn btn-outline" style={{ flex: 1 }} onClick={() => setConfirmDelete(null)}>Cancelar</button>
                <button className="btn" style={{ flex: 1, background: 'var(--danger)', color: '#fff' }}
                  onClick={() => handleDelete(confirmDelete)}>Eliminar</button>
              </div>
            </div>
          </div>
        )}

        {loading ? (
          <div style={{ color: 'var(--muted)', fontSize: 13 }}>Carregando...</div>
        ) : (
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 24 }}>
            {TYPES.map(({ key, label }) => (
              <div key={key}>
                <div style={{ fontSize: 12, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.08em', color: 'var(--muted)', marginBottom: 10 }}>{label}</div>
                <div style={{ display: 'flex', gap: 8, marginBottom: 12 }}>
                  <input
                    className="form-control"
                    style={{ flex: 1, fontSize: 13 }}
                    placeholder="Nova categoria..."
                    value={newName[key]}
                    onChange={e => setNewName(p => ({ ...p, [key]: e.target.value }))}
                    onKeyDown={e => e.key === 'Enter' && handleAdd(key)}
                  />
                  <button className="btn btn-primary" style={{ whiteSpace: 'nowrap', fontSize: 12 }}
                    onClick={() => handleAdd(key)} disabled={adding[key]}>
                    {adding[key] ? '...' : '+ Add'}
                  </button>
                </div>
                <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
                  {categories[key].length === 0 ? (
                    <div style={{ fontSize: 12, color: 'var(--muted)', fontStyle: 'italic' }}>Nenhuma categoria.</div>
                  ) : categories[key].map(cat => (
                    <div key={cat.id} style={{
                      display: 'flex', alignItems: 'center', justifyContent: 'space-between',
                      padding: '7px 10px', background: '#f5f2ed', borderRadius: 4,
                      fontSize: 13
                    }}>
                      <span>{cat.name}</span>
                      <button
                        onClick={() => setConfirmDelete(cat)}
                        style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--muted)', fontSize: 14, padding: '0 2px', lineHeight: 1 }}
                        title="Eliminar">✕</button>
                    </div>
                  ))}
                </div>
              </div>
            ))}
          </div>
        )}
        <div style={{ marginTop: 14, fontSize: 11, color: 'var(--muted)' }}>
          Categorias de despesa aparecem em Contas a Pagar e Solicitações. Categorias de fornecedor aparecem no cadastro de fornecedores.
        </div>
      </div>
    </div>
  );
}

function Configuracoes({ user, profile, expenses, suppliers, revenue, forecast, activityLog, onRefresh, onLogout }) {
  const [name, setName] = useState(profile?.name || '');
  const [password, setPassword] = useState('');
  const [newPassword, setNewPassword] = useState('');
  const [users, setUsers] = useState([]);
  const [inviteEmail, setInviteEmail] = useState('');
  const [inviteRole, setInviteRole] = useState('staff');
  const [saving, setSaving] = useState(false);

  useEffect(() => {
    sb.from('profiles').select('*').then(({ data }) => data && setUsers(data));
  }, []);

  async function saveName() {
    setSaving(true);
    await sb.from('profiles').update({ name }).eq('id', user.id);
    toast('Nome atualizado!', 'success');
    setSaving(false);
    onRefresh();
  }

  async function savePassword() {
    if (!newPassword || newPassword.length < 6) { toast('Senha deve ter ao menos 6 caracteres.', 'error'); return; }
    setSaving(true);
    const { error } = await sb.auth.updateUser({ password: newPassword });
    if (error) toast('Erro: ' + error.message, 'error');
    else { toast('Senha atualizada!', 'success'); setNewPassword(''); }
    setSaving(false);
  }

  async function inviteUser() {
    if (!inviteEmail) { toast('Informe o e-mail.', 'error'); return; }
    setSaving(true);
    const { data, error } = await sb.auth.admin?.inviteUserByEmail(inviteEmail);
    if (error) toast('Invite via Supabase Dashboard: ' + error.message, 'info');
    else toast('Convite enviado!', 'success');
    setSaving(false);
  }

  async function changeRole(uid, role) {
    await sb.from('profiles').update({ role }).eq('id', uid);
    setUsers(p => p.map(u => u.id === uid ? { ...u, role } : u));
    toast('Papel atualizado!', 'success');
  }

  function exportBackup() {
    const backup = { expenses, suppliers, revenue, forecast, exportedAt: new Date().toISOString() };
    const blob = new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href=url; a.download=`vg-backup-${todayISO()}.json`; a.click();
    URL.revokeObjectURL(url);
    toast('Backup exportado!', 'success');
  }

  async function importBackup(e) {
    const file = e.target.files[0];
    if (!file) return;
    const text = await file.text();
    const data = JSON.parse(text);
    if (data.expenses) await sb.from('expenses').upsert(data.expenses);
    if (data.suppliers) await sb.from('suppliers').upsert(data.suppliers);
    if (data.revenue) await sb.from('revenue').upsert(data.revenue);
    toast('Dados importados com sucesso!', 'success');
    onRefresh();
  }

  return (
    <div className="page">
      <div className="page-header">
        <div className="page-title">Configurações</div>
      </div>

      {/* Saldo Inicial */}
      <SaldoInicialConfig />

      {/* Notificações */}
      <NotificacoesConfig expenses={expenses} />

      {/* Importador */}
      <ImportadorPlanilha onRefresh={onRefresh} />

      {/* Log de Atividades */}
      <AtividadeLog activityLog={activityLog} />

      {/* Conta */}
      <div className="settings-section">
        <div className="settings-section-header">Minha Conta</div>
        <div className="settings-section-body">
          <div className="form-grid">
            <div className="form-group">
              <label className="form-label">Nome</label>
              <input className="form-control" value={name} onChange={e=>setName(e.target.value)} />
            </div>
            <div className="form-group" style={{ display: 'flex', alignItems: 'flex-end' }}>
              <button className="btn btn-primary" onClick={saveName} disabled={saving}>Salvar Nome</button>
            </div>
            <div className="form-group">
              <label className="form-label">Nova Senha</label>
              <input className="form-control" type="password" value={newPassword} onChange={e=>setNewPassword(e.target.value)} placeholder="Mínimo 6 caracteres" />
            </div>
            <div className="form-group" style={{ display: 'flex', alignItems: 'flex-end' }}>
              <button className="btn btn-secondary" onClick={savePassword} disabled={saving}>Alterar Senha</button>
            </div>
          </div>
          <div style={{ marginTop: 16 }}>
            <button className="btn btn-danger" onClick={onLogout}>Sair do Sistema</button>
          </div>
        </div>
      </div>

      {/* Usuários */}
      <UsuariosConfig user={user} />

      {/* Categorias */}
      <CategoriasConfig />

      {/* Backup */}
      <div className="settings-section">
        <div className="settings-section-header">Backup & Dados</div>
        <div className="settings-section-body">
          <div style={{ display: 'flex', gap: 12, alignItems: 'center', flexWrap: 'wrap' }}>
            <button className="btn btn-primary" onClick={exportBackup}>⬇ Exportar Backup JSON</button>
            <div>
              <label className="btn btn-secondary" style={{ cursor: 'pointer' }}>
                ⬆ Importar Backup
                <input type="file" accept=".json" style={{ display: 'none' }} onChange={importBackup} />
              </label>
            </div>
          </div>
          <div style={{ marginTop: 12, fontSize: 12, color: 'var(--muted)' }}>
            O backup inclui todas as despesas, receitas, fornecedores e previsões.
            A importação usa upsert — não remove dados existentes.
          </div>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════
   MAIN APP
═══════════════════════════════════════════════════════ */
function App() {
  const [session, setSession] = useState(null);
  const [profile, setProfile] = useState(null);
  const [loading, setLoading] = useState(true);
  const [page, setPage] = useState('dashboard');
  const [online, setOnline] = useState(navigator.onLine);
  const [lastSync, setLastSync] = useState(null);

  // Data state
  const [expenses, setExpenses] = useState([]);
  const [suppliers, setSuppliers] = useState([]);
  const [revenue, setRevenue] = useState([]);
  const [forecast, setForecast] = useState([]);
  const [expenseItems, setExpenseItems] = useState([]);
  const [receivables, setReceivables] = useState([]);
  const [expenseRequests, setExpenseRequests] = useState([]);
  const [activityLog, setActivityLog] = useState([]);
  const [dbCategories, setDbCategories] = useState({ expense: [], supplier: [] });

  // Keep session in a ref so callbacks always have the latest value
  const sessionRef = useRef(null);

  // Modal state for dashboard quick pay
  const [quickModal, setQuickModal] = useState(null);

  const isOwner = profile?.role === 'owner';
  const overdueCount = expenses.filter(e => isOverdue(e.due_date, e.status)).length;

  // Auth listener
  useEffect(() => {
    sb.auth.getSession().then(({ data: { session } }) => {
      setSession(session);
      if (session) loadAll(session);
      else setLoading(false);
    });
    const { data: { subscription } } = sb.auth.onAuthStateChange((_event, session) => {
      setSession(session);
      sessionRef.current = session;
      if (session) loadAll(session);
      else { setProfile(null); setLoading(false); }
    });
    return () => subscription.unsubscribe();
  }, []);

  // Online/offline
  useEffect(() => {
    const goOnline = async () => {
      setOnline(true);
      await processPendingSync();
      toast('Sincronizado com sucesso', 'success');
      loadAll(session);
    };
    const goOffline = () => setOnline(false);
    window.addEventListener('online', goOnline);
    window.addEventListener('offline', goOffline);
    return () => { window.removeEventListener('online', goOnline); window.removeEventListener('offline', goOffline); };
  }, [session]);

  // Keyboard shortcuts
  useEffect(() => {
    function onKey(e) {
      if (e.key === 'n' || e.key === 'N') {
        if (document.activeElement.tagName === 'INPUT' || document.activeElement.tagName === 'TEXTAREA') return;
        setQuickModal('expense');
      }
    }
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, []);

  async function loadAll(s, silent = false) {
    if (!s) return;
    if (!silent) setLoading(true);

    // Safety timeout — never stay stuck on loading
    const timeout = setTimeout(() => {
      console.warn('loadAll timeout — forcing render');
      setLoading(false);
    }, 8000);

    try {
      // Load each table independently so one failure doesn't block others
      const [expRes, supRes, revRes, fcRes] = await Promise.all([
        sb.from('expenses').select('*').order('due_date', { ascending: false }),
        sb.from('suppliers').select('*').order('name'),
        sb.from('revenue').select('*'),
        sb.from('forecast').select('*'),
      ]);

      if (expRes.data) { setExpenses(expRes.data); idbSet('expenses','all',expRes.data); }
      else { const cached = await idbGet('expenses','all'); if(cached) setExpenses(cached); }

      if (supRes.data) {
        let sups = supRes.data;
        if (sups.length === 0) {
          const { data: seeded } = await sb.from('suppliers').insert(DEFAULT_SUPPLIERS).select();
          sups = seeded || [];
        }
        setSuppliers(sups);
        idbSet('suppliers','all',sups);
      } else { const cached = await idbGet('suppliers','all'); if(cached) setSuppliers(cached); }

      if (revRes.data) { setRevenue(revRes.data); idbSet('revenue','all',revRes.data); }
      else { const cached = await idbGet('revenue','all'); if(cached) setRevenue(cached); }

      if (fcRes.data) setForecast(fcRes.data);

      // Profile — load separately with fallback
      try {
        const { data: profData } = await sb.from('profiles').select('*').eq('id', s.user.id);
        if (profData && profData.length > 0) {
          setProfile(profData[0]);
        } else {
          const newProfile = { id: s.user.id, name: s.user.email.split('@')[0], role: 'staff' };
          await sb.from('profiles').insert(newProfile);
          setProfile(newProfile);
        }
      } catch(profErr) {
        console.error('Profile load error:', profErr);
      }

      // categories — non-blocking
      sb.from('categories').select('*').order('name')
        .then(({ data }) => {
          if (data) {
            const grouped = { expense: [], supplier: [] };
            data.forEach(c => { if (grouped[c.type]) grouped[c.type].push(c.name); });
            setDbCategories(grouped);
          }
        })
        .catch(e => console.warn('categories load failed:', e));

      // expense_items — non-blocking
      sb.from('expense_items').select('*')
        .then(({ data }) => { if (data) { setExpenseItems(data); idbSet('expense_items','all',data); } })
        .catch(e => console.warn('expense_items load failed:', e));

      // receivables — non-blocking
      sb.from('receivables').select('*').order('expected_date')
        .then(({ data }) => { if (data) setReceivables(data); })
        .catch(e => console.warn('receivables load failed:', e));

      // expense_requests — non-blocking
      sb.from('expense_requests').select('*').order('created_at', { ascending: false })
        .then(({ data }) => { if (data) setExpenseRequests(data); })
        .catch(e => console.warn('expense_requests load failed:', e));

      // activity_log — non-blocking
      sb.from('activity_log').select('*, profiles(name)').order('created_at', { ascending: false }).limit(100)
        .then(({ data }) => { if (data) setActivityLog(data); })
        .catch(e => console.warn('activity_log load failed:', e));

      setLastSync(new Date());
    } catch (err) {
      console.error('loadAll error:', err);
      try {
        const [ce, cs, cr, ci] = await Promise.all([
          idbGet('expenses','all'), idbGet('suppliers','all'),
          idbGet('revenue','all'), idbGet('expense_items','all')
        ]);
        if (ce) setExpenses(ce);
        if (cs) setSuppliers(cs);
        if (cr) setRevenue(cr);
        if (ci) setExpenseItems(ci);
      } catch(e) { console.warn('Cache fallback failed:', e); }
    } finally {
      clearTimeout(timeout);
      if (!silent) setLoading(false);
    }
  }


  // ── REALTIME SUBSCRIPTIONS ─────────────────────────────
  const realtimeChannels = useRef([]);

  function setupRealtime() {
    // Cleanup existing subscriptions
    realtimeChannels.current.forEach(ch => sb.removeChannel(ch));
    realtimeChannels.current = [];

    // Expenses
    const expCh = sb.channel('expenses-changes')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'expenses' },
        payload => {
          if (payload.eventType === 'INSERT') {
            setExpenses(prev => {
              if (prev.find(e => e.id === payload.new.id)) return prev;
              return [payload.new, ...prev];
            });
          } else if (payload.eventType === 'UPDATE') {
            setExpenses(prev => prev.map(e => e.id === payload.new.id ? payload.new : e));
          } else if (payload.eventType === 'DELETE') {
            setExpenses(prev => prev.filter(e => e.id !== payload.old.id));
          }
        }
      ).subscribe();

    // Revenue
    const revCh = sb.channel('revenue-changes')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'revenue' },
        payload => {
          if (payload.eventType === 'INSERT') {
            setRevenue(prev => {
              if (prev.find(r => r.id === payload.new.id)) return prev;
              return [...prev, payload.new];
            });
          } else if (payload.eventType === 'UPDATE') {
            setRevenue(prev => prev.map(r => r.id === payload.new.id ? payload.new : r));
          } else if (payload.eventType === 'DELETE') {
            setRevenue(prev => prev.filter(r => r.id !== payload.old.id));
          }
        }
      ).subscribe();

    // Receivables
    const recCh = sb.channel('receivables-changes')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'receivables' },
        payload => {
          if (payload.eventType === 'INSERT') {
            setReceivables(prev => {
              if (prev.find(r => r.id === payload.new.id)) return prev;
              return [...prev, payload.new];
            });
          } else if (payload.eventType === 'UPDATE') {
            setReceivables(prev => prev.map(r => r.id === payload.new.id ? payload.new : r));
          } else if (payload.eventType === 'DELETE') {
            setReceivables(prev => prev.filter(r => r.id !== payload.old.id));
          }
        }
      ).subscribe();

    // Expense requests
    const reqCh = sb.channel('requests-changes')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'expense_requests' },
        payload => {
          if (payload.eventType === 'INSERT') {
            setExpenseRequests(prev => {
              if (prev.find(r => r.id === payload.new.id)) return prev;
              return [payload.new, ...prev];
            });
          } else if (payload.eventType === 'UPDATE') {
            setExpenseRequests(prev => prev.map(r => r.id === payload.new.id ? payload.new : r));
          } else if (payload.eventType === 'DELETE') {
            setExpenseRequests(prev => prev.filter(r => r.id !== payload.old.id));
          }
        }
      ).subscribe();

    realtimeChannels.current = [expCh, revCh, recCh, reqCh];
  }

  // Start realtime when session is active
  useEffect(() => {
    if (session) {
      setupRealtime();
    }
    return () => {
      realtimeChannels.current.forEach(ch => sb.removeChannel(ch));
    };
  }, [session]);

  async function handleLogin(s) {
    setSession(s);
    sessionRef.current = s;
    await loadAll(s);
  }

  async function handleLogout() {
    await sb.auth.signOut();
    setSession(null); setProfile(null); setExpenses([]); setSuppliers([]); setRevenue([]);
  }

  async function handleQuickPay(exp, paidDate) {
    const date = paidDate || todayISO();
    await sb.from('expenses').update({ status: 'pago', paid_date: date }).eq('id', exp.id);
    toast('Pago com sucesso!', 'success');
    setQuickModal(null);
    loadAll(sessionRef.current, true);
  }

  function showModal(type, data) {
    setQuickModal({ type, data });
  }

  if (loading) {
    return (
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', height: '100vh', background: 'var(--offwhite)', flexDirection: 'column', gap: 16 }}>
        <div style={{ fontFamily: 'var(--font-display)', fontSize: 22, fontWeight: 900 }}>VITTO &amp; GIULIO</div>
        <div className="skeleton" style={{ width: 200, height: 8 }} />
        <div style={{ fontSize: 12, color: 'var(--muted)' }}>Carregando sistema...</div>
      </div>
    );
  }

  if (!session) return <AuthScreen onLogin={handleLogin} />;

  const pendingRequests = expenseRequests.filter(r => r.status === 'pendente').length;
  const pendingReceivables = receivables.filter(r => r.status === 'pendente').length;

  const navItems = [
    { id: 'dashboard', label: 'Dashboard', shortLabel: 'Home', icon: '◈' },
    { id: 'contas', label: 'Contas a Pagar', shortLabel: 'Contas', icon: '◎', badge: overdueCount > 0 ? overdueCount : null },
    { id: 'recebimentos', label: 'A Receber', shortLabel: 'Receber', icon: '◑', badge: pendingReceivables > 0 ? pendingReceivables : null },
    { id: 'receitas', label: 'Receitas', shortLabel: 'Receitas', icon: '◐' },
    { id: 'solicitacoes', label: 'Solicitações', shortLabel: 'Solicitar', icon: '◌', badge: isOwner && pendingRequests > 0 ? pendingRequests : null },
    { id: 'fornecedores', label: 'Fornecedores', shortLabel: 'Fornec.', icon: '◉' },
    { id: 'fluxo', label: 'Fluxo de Caixa', shortLabel: 'Fluxo', icon: '◆' },
    ...(isOwner ? [{ id: 'relatorios', label: 'Relatórios', shortLabel: 'Relatórios', icon: '◇' }] : []),
    ...(isOwner ? [{ id: 'config', label: 'Configurações', shortLabel: 'Config', icon: '⊙' }] : []),
  ];

  const expenseCategories = dbCategories.expense.length > 0 ? dbCategories.expense : CATEGORIES;
  const supplierCategories = dbCategories.supplier.length > 0 ? dbCategories.supplier : SUPPLIER_CATEGORIES;

  return (
    <CategoriesContext.Provider value={{ expenseCategories, supplierCategories }}>
    <div className="app">
      {/* SIDEBAR */}
      <div className="sidebar">
        <div className="sidebar-brand">
          <div className="sidebar-brand-name">VITTO &amp; GIULIO</div>
          <div className="sidebar-brand-rule" />
          <div className="sidebar-brand-sub">Gestão Financeira</div>
        </div>
        <nav className="sidebar-nav">
          {navItems.map(item => (
            <div key={item.id} className={`nav-item ${page === item.id ? 'active' : ''}`} onClick={() => setPage(item.id)}>
              <span className="nav-icon">{item.icon}</span>
              <span className="nav-label">{item.shortLabel || item.label}</span>
              {item.badge && <span className="nav-badge">{item.badge}</span>}
            </div>
          ))}
        </nav>
        <div className="sidebar-user">
          <div className="user-avatar">{(profile?.name||'?')[0].toUpperCase()}</div>
          <div className="user-info">
            <div className="user-name">{profile?.name || session.user.email}</div>
            <div className="user-role">{profile?.role || 'staff'}</div>
          </div>
          <div className="sidebar-logout" onClick={handleLogout} title="Sair">⏻</div>
        </div>
      </div>

      {/* CONTENT */}
      <div className="content">
        {!online && (
          <div className="offline-banner">
            ⚡ Modo offline — exibindo dados do último acesso. Alterações serão sincronizadas ao reconectar.
          </div>
        )}

        {page === 'dashboard' && (
          <Dashboard
            expenses={expenses}
            revenue={revenue}
            showModal={showModal}
            onRefresh={() => loadAll(sessionRef.current, true)}
            session={session}
            pendingRequests={isOwner ? expenseRequests.filter(r=>r.status==='pendente').length : 0}
            pendingReceivables={receivables.filter(r=>r.status==='pendente')}
          />
        )}
        {page === 'contas' && (
          <ContasPagar
            expenses={expenses}
            setExpenses={setExpenses}
            suppliers={suppliers}
            revenue={revenue}
            onRefresh={() => loadAll(sessionRef.current, true)}
            isOwner={isOwner}
          />
        )}
        {page === 'recebimentos' && (
          <Recebimentos
            receivables={receivables}
            setReceivables={setReceivables}
            revenue={revenue}
            setRevenue={setRevenue}
            onRefresh={() => loadAll(sessionRef.current, true)}
          />
        )}
        {page === 'solicitacoes' && (
          <Solicitacoes
            requests={expenseRequests}
            setRequests={setExpenseRequests}
            expenses={expenses}
            setExpenses={setExpenses}
            suppliers={suppliers}
            isOwner={isOwner}
            session={session}
            onRefresh={() => loadAll(sessionRef.current, true)}
          />
        )}
        {page === 'receitas' && (
          <Receitas
            revenue={revenue}
            setRevenue={setRevenue}
            onRefresh={() => loadAll(sessionRef.current, true)}
            session={session}
          />
        )}
        {page === 'fornecedores' && (
          <Fornecedores
            suppliers={suppliers}
            expenses={expenses}
            onRefresh={() => loadAll(sessionRef.current, true)}
            isOwner={isOwner}
          />
        )}
        {page === 'fluxo' && (
          <FluxoDeCaixa
            expenses={expenses}
            revenue={revenue}
            onRefresh={() => loadAll(sessionRef.current, true)}
          />
        )}
        {page === 'relatorios' && isOwner && (
          <Relatorios expenses={expenses} revenue={revenue} expenseItems={expenseItems} />
        )}
        {page === 'config' && isOwner && (
          <Configuracoes
            user={session.user}
            profile={profile}
            expenses={expenses}
            suppliers={suppliers}
            revenue={revenue}
            forecast={forecast}
            activityLog={activityLog}
            onRefresh={() => loadAll(sessionRef.current, true)}
            onLogout={handleLogout}
          />
        )}
      </div>

      {/* Quick pay modal from dashboard */}
      {quickModal?.type === 'pay' && (
        <PagarModal
          expense={quickModal.data}
          onConfirm={(exp, date) => handleQuickPay(exp, date)}
          onClose={() => setQuickModal(null)}
        />
      )}

      {/* Quick new expense from FAB */}
      {quickModal?.type === 'expense' && (
        <ExpenseModal
          expense={null}
          suppliers={suppliers}
          onSave={async (payload, nfItems) => {
            const user = (await sb.auth.getUser()).data.user;
            const { data, error } = await sb.from('expenses').insert({ ...payload, created_by: user.id }).select().single();
            if (error) { toast('Erro: ' + error.message, 'error'); return; }

            // Save NF items if present
            if (nfItems && nfItems.length > 0 && data) {
              const itemsPayload = nfItems.map(item => ({
                expense_id: data.id,
                description: item.description,
                quantity: parseFloat(item.quantity) || 1,
                unit: item.unit || null,
                unit_price: parseFloat(item.unit_price) || null,
                total: parseFloat(item.total) || 0,
                category: item.category || 'Outros',
                ncm: item.ncm || null,
              }));
              const { error: itemsError } = await sb.from('expense_items').insert(itemsPayload);
              if (itemsError) toast('Despesa salva, mas erro nos itens: ' + itemsError.message, 'error');
              else toast(`Despesa + ${nfItems.length} itens salvos!`, 'success');
            } else {
              toast('Despesa salva!', 'success');
            }

            setQuickModal(null);
            loadAll(sessionRef.current, true);
          }}
          onClose={() => setQuickModal(null)}
        />
      )}

      <ToastContainer />

      {lastSync && (
        <div className="sync-indicator">
          sync {lastSync.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' })}
        </div>
      )}
    </div>
    </CategoriesContext.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

<!--
═══════════════════════════════════════════════════════════════
  PASSO A PASSO — SETUP INICIAL
═══════════════════════════════════════════════════════════════

1. Acesse supabase.com e crie uma conta gratuita.

2. Crie um novo projeto:
   - Nome: vitto-giulio-finance
   - Região: South America (São Paulo)
   - Guarde a senha do banco

3. Aguarde inicializar (~2 minutos).

4. Vá em SQL Editor → New Query → cole e execute o SQL abaixo:

─────────────────────────────────────────────────────────────
  create table profiles (
    id uuid references auth.users primary key,
    name text not null,
    role text not null check (role in ('owner', 'staff')),
    created_at timestamptz default now()
  );

  create table suppliers (
    id uuid primary key default gen_random_uuid(),
    name text not null,
    category text not null,
    contact text,
    default_payment_method text,
    notes text,
    created_at timestamptz default now()
  );

  create table expenses (
    id uuid primary key default gen_random_uuid(),
    supplier_id uuid references suppliers(id) on delete set null,
    supplier_name text not null,
    category text not null,
    expense_type text,
    amount numeric(12,2) not null,
    due_date date not null,
    payment_method text,
    status text not null default 'pendente'
      check (status in ('pendente', 'pago')),
    paid_date date,
    recurring boolean default false,
    frequency text check (frequency in ('semanal','mensal','anual')),
    week_range text,
    notes text,
    created_by uuid references auth.users(id),
    created_at timestamptz default now()
  );

  create table revenue (
    id uuid primary key default gen_random_uuid(),
    month text not null,
    amount numeric(12,2) not null,
    notes text,
    created_by uuid references auth.users(id),
    created_at timestamptz default now()
  );

  create table forecast (
    id uuid primary key default gen_random_uuid(),
    month text not null,
    projected_revenue numeric(12,2),
    notes text,
    updated_at timestamptz default now()
  );

  alter table profiles enable row level security;
  alter table suppliers enable row level security;
  alter table expenses enable row level security;
  alter table revenue enable row level security;
  alter table forecast enable row level security;

  create policy "auth_all" on suppliers
    for all using (auth.role() = 'authenticated');
  create policy "auth_all" on expenses
    for all using (auth.role() = 'authenticated');
  create policy "auth_all" on revenue
    for all using (auth.role() = 'authenticated');
  create policy "auth_all" on forecast
    for all using (auth.role() = 'authenticated');
  create policy "own_profile" on profiles
    for all using (auth.uid() = id);
─────────────────────────────────────────────────────────────

5. Vá em Project Settings → API → copie:
   - Project URL  → substitua YOUR_SUPABASE_URL no código
   - anon public  → substitua YOUR_SUPABASE_ANON_KEY

6. Vá em Authentication → Providers → Email →
